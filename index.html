<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>建物検査システム</title>
  <style>
    :root{
      --bg:#f3f4f6; --card:#fff; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
      --brand:#2563eb; --danger:#dc2626; --ok:#16a34a;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 14px;
      --bubbleW: 150px;
      --bubbleH: 44px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1600px;margin:0 auto;padding:14px}
    .row{display:flex;gap:14px;align-items:stretch}
    .col{flex:1}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card h2{margin:0;padding:14px 14px 10px 14px;font-size:16px}
    .card .body{padding:14px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer;font-weight:600}
    .btn:hover{border-color:#cbd5e1}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
    .btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:var(--muted)}
    .field input,.field select,.field textarea{border:1px solid var(--line);border-radius:12px;padding:10px 10px;font-size:14px;background:#fff}
    .field textarea{min-height:78px;resize:vertical}
    .hint{font-size:12px;color:var(--muted);line-height:1.5}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .divider{height:1px;background:var(--line);margin:12px 0}
    .stageWrap{position:relative;width:100%;background:#fff;border-radius:14px;border:1px dashed #d1d5db;overflow:hidden;aspect-ratio:16/9;}
    canvas#bg{position:absolute;top:0;left:0;display:block;}
    svg#overlay{position:absolute;top:0;left:0;touch-action:none}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted);background:#fff}
    .status{display:flex;gap:10px;flex-wrap:wrap}
    .toast{position:fixed;right:16px;bottom:16px;background:#111827;color:#fff;padding:12px 14px;border-radius:14px;box-shadow:var(--shadow);max-width:520px;display:none;white-space:pre-wrap}
    .list{overflow:auto;border:1px solid var(--line);border-radius:14px}
    .item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer}
    .item:last-child{border-bottom:none}
    .item:hover{background:#f9fafb}
    .item .meta{flex:1;min-width:0}
    .item .meta .t{font-weight:800;font-size:13px}
    .item .meta .s{font-size:12px;color:var(--muted);margin-top:2px}
    .item .act{display:flex;gap:8px}
    .tag{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 8px;color:var(--muted)}
    .sel{outline:2px solid var(--brand);outline-offset:-2px}
    .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;background:#f9fafb;border:1px solid var(--line);padding:2px 6px;border-radius:8px;color:#111827}
    .small{font-size:12px;color:var(--muted)}

    /* フルスクリーンモード */
    .fs-btn{position:absolute;top:10px;right:10px;z-index:10;background:rgba(17,24,39,.75);color:#fff;border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;backdrop-filter:blur(4px);}
    .fs-btn:hover{background:rgba(17,24,39,.95)}
    .stageWrap.fullscreen{position:fixed;top:0;left:0;width:100vw;height:100vh;width:100dvw;height:100dvh;z-index:1000;border-radius:0;border:none;aspect-ratio:unset;transform-origin:center center;transition:transform 0.3s ease;}
    /* 回転クラス */
    .stageWrap.fullscreen.rot90 {transform:rotate(90deg);width:100vh;height:100vw;top:calc((100vh - 100vw)/2);left:calc((100vw - 100vh)/2);}
    .stageWrap.fullscreen.rot180{transform:rotate(180deg);}
    .stageWrap.fullscreen.rot270{transform:rotate(270deg);width:100vh;height:100vw;top:calc((100vh - 100vw)/2);left:calc((100vw - 100vh)/2);}
    #fsPanel{display:none;position:fixed;z-index:2000;background:rgba(17,24,39,.88);backdrop-filter:blur(12px);border-radius:20px;padding:12px 20px;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:96vw;cursor:grab;user-select:none;touch-action:none;}
    #fsPanel.show{display:flex}
    #fsPanel.dragging{cursor:grabbing;}
    #fsPanelHandle{width:36px;height:4px;background:#475569;border-radius:4px;margin:0 auto 8px auto;cursor:grab;flex-basis:100%;}
    #fsPanel label{font-size:11px;color:#94a3b8;margin-bottom:2px;display:block}
    #fsPanel select{background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:10px;padding:8px 10px;font-size:14px;font-weight:600;}
    #fsPanel .fs-field{display:flex;flex-direction:column;gap:2px}
    #fsPanel .sep{width:1px;height:38px;background:#334155;flex-shrink:0}
    #fsPanel .fs-count{font-size:12px;color:#64748b;white-space:nowrap}

    /* Supabase クラウドパネル */
    .cloud-panel{padding:12px 14px;margin-bottom:12px}
    .cloud-panel h3{margin:0 0 8px 0;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .cloud-meta-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:10px 0}
    .cloud-meta-row input{font-size:13px;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
    .cloud-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .cloud-list{margin-top:10px;border:1px solid var(--line);border-radius:12px;max-height:200px;overflow:auto}
    .cloud-list-item{display:flex;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px}
    .cloud-list-item:last-child{border-bottom:none}
    .cloud-list-item:hover{background:#f9fafb}
    .cloud-list-item.sel{background:#eff6ff}
    .cloud-list-item .cloud-list-meta{flex:1;min-width:0}
    .cloud-list-item .cloud-list-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cloud-list-item .cloud-list-sub{font-size:11px;color:var(--muted)}
    .tag.cloud-ok{border-color:#86efac;color:#166534;background:#f0fdf4}
    .tag.cloud-warn{border-color:#fcd34d;color:#92400e;background:#fffbeb}
    .tag.cloud-err{border-color:#fca5a5;color:#991b1b;background:#fef2f2}
    .mapping-panel{display:none;margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#f8fafc}
    .mapping-panel.open{display:block}
    .mapping-grid{display:grid;grid-template-columns:minmax(80px,1fr) auto minmax(140px,1.2fr) auto;gap:8px;align-items:center}
    .mapping-head{font-size:12px;font-weight:700;color:#334155;padding-bottom:4px;border-bottom:1px dashed #cbd5e1}
    .mapping-row{padding:6px 0;border-bottom:1px solid #e2e8f0}
    .mapping-row:last-child{border-bottom:none}
    .mapping-row select{width:100%;font-size:13px;border:1px solid var(--line);border-radius:10px;padding:7px 9px;background:#fff}
    .mapping-row input[type="checkbox"]{width:16px;height:16px}
    .mapping-state{font-size:11px;color:var(--muted);white-space:nowrap}
    .vendor-state{font-size:11px;color:#334155;background:#f8fafc;border:1px solid #dbeafe;border-radius:8px;padding:5px 8px;white-space:nowrap}
    .legacy-input-note{font-size:11px;color:#6b7280;padding:4px 8px;border:1px dashed #d1d5db;border-radius:10px;background:#f9fafb}
    #quickMarkerEditor{
      position:absolute;
      z-index:1200;
      display:none;
      width:min(360px, calc(100% - 12px));
      background:#fff;
      border:1px solid #dbe1ea;
      border-radius:14px;
      box-shadow:0 10px 26px rgba(15,23,42,.18);
      padding:10px;
      touch-action:manipulation;
    }
    #quickMarkerEditor .qe-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
    #quickMarkerEditor .qe-label{font-size:11px;color:#475569;font-weight:700}
    #quickTypeChips{display:flex;gap:6px;flex-wrap:wrap}
    #quickTypeChips .type-chip{
      border:1px solid #cbd5e1;
      background:#f8fafc;
      color:#0f172a;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      padding:8px 12px;
      min-height:38px;
      cursor:pointer;
    }
    #quickTypeChips .type-chip.active{
      background:#2563eb;
      color:#fff;
      border-color:#2563eb;
    }
    #quickMarkerEditor select,#quickMarkerEditor input{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      font-size:14px;
      padding:9px 10px;
      min-height:40px;
      background:#fff;
    }
    #quickMarkerEditor .qe-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:10px}
    #quickMarkerEditor .qe-actions .btn{padding:10px 14px;min-height:42px}
    #quickMarkerEditor .qe-vendor-row{display:flex;gap:6px;align-items:stretch}
    #quickMarkerEditor .qe-vendor-row select{flex:1}
    @media (max-width: 900px){
      #quickMarkerEditor{width:min(400px, calc(100% - 10px));padding:11px}
      #quickTypeChips .type-chip{font-size:14px;min-height:40px;padding:8px 13px}
      #quickMarkerEditor .qe-actions .btn{min-width:90px}
    }
    @media (max-width: 860px){
      .mapping-grid{grid-template-columns:1fr auto;gap:6px}
      .mapping-head{display:none}
      .mapping-row{display:grid;grid-template-columns:1fr auto;gap:6px}
      .mapping-row .mapping-full{grid-column:1 / -1}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="wrap">

    <!-- ── ヘッダー操作バー ── -->
    <div class="topbar card" style="margin-bottom:12px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center">
      <strong style="font-size:15px;margin-right:4px">🏗 建物検査</strong>
      <div class="field" style="flex-direction:row;align-items:center;gap:6px;margin:0">
        <label style="white-space:nowrap;font-size:12px;color:var(--muted)">PDF</label>
        <input id="pdfInput" type="file" accept="application/pdf" style="font-size:12px" />
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn" id="btnPrevPage" style="padding:7px 10px">◀</button>
        <span class="tag" id="pageInfo" style="white-space:nowrap">PDF未選択</span>
        <button class="btn" id="btnNextPage" style="padding:7px 10px">▶</button>
        <input id="pageInput" type="number" min="1" value="1" style="width:64px;border:1px solid var(--line);border-radius:10px;padding:7px 8px;font-size:13px" />
      </div>
      <div style="display:flex;gap:8px;margin-left:auto;flex-wrap:wrap">
        <button class="btn primary" id="btnSavePng" style="padding:7px 12px;font-size:13px">💾 保存</button>
        <button class="btn" id="btnEditMemo" disabled style="padding:7px 12px;font-size:13px">📝 メモ</button>
        <button class="btn danger" id="btnDeleteSelected" disabled style="padding:7px 12px;font-size:13px">🗑 削除</button>
        <button class="btn" id="btnClearStorage" style="padding:7px 12px;font-size:13px">⚠ データ消去</button>
      </div>
    </div>

    <!-- ── Supabase クラウド ── -->
    <div class="card cloud-panel">
      <h3>
        ☁ クラウド（Supabase）
        <span class="tag" id="cloudStatus">未設定</span>
        <span class="small" id="cloudCurrentId" style="font-weight:400"></span>
      </h3>
      <div class="cloud-meta-row">
        <input id="inpTitle" type="text" placeholder="検査タイトル *" />
        <input id="inpPropertyName" type="text" placeholder="物件名" />
        <input id="inpSiteName" type="text" placeholder="現場名" />
        <input id="inpBuildingName" type="text" placeholder="建物名" />
        <input id="inpInspectedAt" type="date" />
        <input id="inpInspectorName" type="text" placeholder="検査担当者" />
      </div>
      <div class="cloud-actions">
        <button class="btn" id="btnSupabaseTest" type="button">Supabase接続確認</button>
        <button class="btn ok" id="btnNewInspection" type="button">新規検査案件作成</button>
        <button class="btn primary" id="btnCloudSave" type="button">クラウド保存</button>
        <button class="btn" id="btnCloudLoad" type="button">クラウド読み込み</button>
        <button class="btn" id="btnToggleMappingPanel" type="button">指摘種別・業者紐づけ設定</button>
      </div>
      <div class="small" style="margin-top:6px">保存済み検査案件一覧（行を選択して「クラウド読み込み」、または各行の読み込み）</div>
      <div class="cloud-list" id="cloudInspectionList">
        <div class="cloud-list-item" style="cursor:default;color:var(--muted)">接続設定後に一覧を取得できます</div>
      </div>
      <div class="mapping-panel" id="mappingPanel">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
          <strong style="font-size:13px">指摘種別ごとの標準担当業者</strong>
          <span class="small" id="mappingPanelStatus">未保存の変更はありません</span>
        </div>
        <div id="mappingSettingsList"></div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn primary" id="btnSaveMappings" type="button">紐づけ設定を保存</button>
          <button class="btn" id="btnReloadMappings" type="button">再読み込み</button>
        </div>
      </div>
    </div>

    <!-- ── メインエリア ── -->
    <div class="main-col">

      <!-- 図面カード -->
      <div class="card" style="margin-bottom:12px">

        <!-- 図面上部：指摘種別・業者セレクタ -->
        <div class="drawing-controls card" style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:10px 14px;border-bottom:1px solid var(--line);margin:0;box-shadow:none;border-radius:var(--radius) var(--radius) 0 0;border:none;border-bottom:1px solid var(--line)">
          <div class="field" style="min-width:140px;flex:1">
            <label>指摘種別</label>
            <select id="typeSelect">
              <option value="傷">傷</option>
              <option value="汚れ">汚れ</option>
              <option value="建具">建具</option>
              <option value="設備">設備</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field" style="min-width:140px;flex:1">
            <label>業者</label>
            <select id="vendorSelect">
              <option value="大工">大工</option>
              <option value="電気">電気</option>
              <option value="設備">設備</option>
              <option value="内装">内装</option>
              <option value="クリーニング">クリーニング</option>
              <option value="その他">その他</option>
            </select>
            <span id="vendorStateLabel" class="vendor-state">自動：-</span>
          </div>
          <div class="field" style="min-width:200px;flex:2">
            <label>メモ（任意）</label>
            <input type="text" id="memoInput" placeholder="例：巾木のキズ、タッチアップ要" style="border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px" />
          </div>
          <div class="field" style="flex-direction:column;gap:4px;align-self:center">
            <label style="font-size:11px;color:var(--muted)">図面回転</label>
            <div style="display:flex;gap:6px">
              <button class="btn" id="btnRotL" title="左90°回転" style="padding:7px 11px;font-size:16px">↺</button>
              <button class="btn" id="btnRotR" title="右90°回転" style="padding:7px 11px;font-size:16px">↻</button>
            </div>
          </div>
          <span class="legacy-input-note" style="white-space:nowrap;align-self:center">新規入力は図面上ポップアップで行います</span>
        </div>

        <!-- 図面ステージ（横画面デフォルト） -->
        <div class="stageWrap" id="stageWrap" style="aspect-ratio:16/9;border-radius:0">
          <canvas id="bg"></canvas>
          <svg id="overlay"></svg>
          <div id="quickMarkerEditor">
            <div class="qe-label" style="margin-bottom:6px">ピン編集</div>
            <div class="qe-row" id="quickTypeChips"></div>
            <div class="qe-row">
              <div style="width:100%">
                <div class="qe-label">指摘種別</div>
                <select id="quickMarkerType"></select>
              </div>
            </div>
            <div class="qe-row">
              <div style="width:100%">
                <div class="qe-label">業者</div>
                <div class="qe-vendor-row">
                  <select id="quickMarkerVendor"></select>
                  <button class="btn" id="quickMarkerVendorClear" type="button">クリア</button>
                </div>
              </div>
            </div>
            <div class="qe-row">
              <div style="width:100%">
                <div class="qe-label">メモ（任意）</div>
                <input id="quickMarkerMemo" type="text" placeholder="メモを入力" />
              </div>
            </div>
            <div class="qe-actions">
              <button class="btn danger" id="quickMarkerDelete" type="button">削除</button>
              <button class="btn" id="quickMarkerCancel" type="button">キャンセル</button>
              <button class="btn primary" id="quickMarkerSave" type="button">保存</button>
            </div>
          </div>
          <button class="fs-btn" id="btnFullscreen">⛶ フルスクリーン</button>
        </div>

        <!-- 図面下部：指摘一覧 -->
        <div style="padding:12px 14px 0">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            <strong style="font-size:14px">指摘一覧</strong>
            <div class="field" style="flex-direction:row;align-items:center;gap:6px;margin:0">
              <label style="font-size:12px;color:var(--muted);white-space:nowrap">業者フィルタ</label>
              <select id="filterVendor" style="border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:13px">
                <option value="">全て</option>
                <option value="大工">大工</option>
                <option value="電気">電気</option>
                <option value="設備">設備</option>
                <option value="内装">内装</option>
                <option value="クリーニング">クリーニング</option>
                <option value="その他">その他</option>
              </select>
            </div>
          </div>
          <div class="list" id="list" style="max-height:280px"></div>
          <div style="height:14px"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- フルスクリーン操作パネル - body直下でposition:fixed -->
  <div id="fsPanel">
    <div id="fsPanelHandle" title="ドラッグで移動"></div>
    <div class="fs-field">
      <label>指摘種別</label>
      <select id="fsTypeSelect">
        <option value="傷">傷</option>
        <option value="汚れ">汚れ</option>
        <option value="建具">建具</option>
        <option value="設備">設備</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="sep"></div>
    <div class="fs-field">
      <label>業者</label>
      <select id="fsVendorSelect">
        <option value="大工">大工</option>
        <option value="電気">電気</option>
        <option value="設備">設備</option>
        <option value="内装">内装</option>
        <option value="クリーニング">クリーニング</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="sep"></div>
    <div class="fs-field">
      <label>ページ</label>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn" id="fsBtnPrev" style="padding:7px 10px;background:#1e293b;color:#f1f5f9;border-color:#334155">◀</button>
        <span class="fs-count" id="fsPageInfo">-</span>
        <button class="btn" id="fsBtnNext" style="padding:7px 10px;background:#1e293b;color:#f1f5f9;border-color:#334155">▶</button>
      </div>
    </div>
    <div class="sep"></div>
    <div class="fs-field">
      <label>回転</label>
      <div style="display:flex;gap:6px">
        <button class="btn" id="fsBtnRotL" title="左90°" style="padding:7px 12px;background:#1e293b;color:#f1f5f9;border-color:#334155;font-size:17px">↺</button>
        <button class="btn" id="fsBtnRotR" title="右90°" style="padding:7px 12px;background:#1e293b;color:#f1f5f9;border-color:#334155;font-size:17px">↻</button>
      </div>
    </div>
    <div class="sep"></div>
    <span class="fs-count" id="fsMarkerCount">指摘 0件</span>
    <div class="sep"></div>
    <div class="fs-field">
      <label>選択中</label>
      <button class="btn" id="fsBtnDelete" disabled style="padding:8px 14px;background:#7f1d1d;color:#fca5a5;border-color:#991b1b">🗑 削除</button>
      <button class="btn" id="fsBtnEditMemo" disabled style="padding:8px 14px;background:#1e3a5f;color:#93c5fd;border-color:#1d4ed8">📝 メモ</button>
    </div>
    <button class="btn" id="btnExitFs" style="background:#dc2626;color:#fff;border-color:#dc2626;padding:8px 14px">✕ 閉じる</button>
  </div>
  <script>
  document.addEventListener("DOMContentLoaded", function(){
    // -------------------- Utilities --------------------
    const $ = (id)=>document.getElementById(id);
    const toast = (msg)=>{
      const t = $("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(toast._tm);
      toast._tm = setTimeout(()=>{t.style.display="none";}, 6000);
    };
    const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));

    // -------------------- Persistent Storage --------------------
    const STORAGE_KEY = "inspection_system_v3_plainjs";
    const defaultStore = {
      version: 1,
      // backgrounds:
      // activeBg: { kind:"none"|"pdf", pdfId:"...", page:1, pageCount: N, pageCache: { "pdfId:page": dataURL } }
      activeBg: { kind:"none" },
      // markersByKey: { "template": [..], "pdf:PDFID:1": [..] }
      markersByKey: {}
    };

    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return structuredClone(defaultStore);
        const obj = JSON.parse(raw);
        if(!obj || typeof obj !== "object") return structuredClone(defaultStore);
        if(!obj.markersByKey) obj.markersByKey = {};
        if(!obj.activeBg) obj.activeBg = { kind:"none" };
        normalizeMarkersByKey(obj.markersByKey);
        return obj;
      }catch(e){
        console.error(e);
        return structuredClone(defaultStore);
      }
    }
    function saveStore(){
      try{
        // pageCache（ページ画像）はlocalStorageに保存しない（容量が大きすぎるため）
        // マーカーデータのみ保存する
        const toSave = {
          ...store,
          activeBg: store.activeBg ? { ...store.activeBg, pageCache: {} } : store.activeBg
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
      }catch(e){
        console.error(e);
        toast("マーカー保存に失敗しました。\n" + String(e));
      }
    }

    // -------------------- Supabase（検査案件・マーカーのクラウド保存） --------------------
    const SUPABASE_URL = "https://yxviqbjzpshestwpmohr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4dmlxYmp6cHNoZXN0d3Btb2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDAwMzgsImV4cCI6MjA5NTcxNjAzOH0.o8Li0WfCmVqKEx8BbZGI_PmdDQ723-mM5ITIgZi4xMc";

    let supabaseClient = null;
    let currentInspectionId = null;
    let selectedCloudInspectionId = null;
    let currentDrawingId = null;
    let currentDrawingStoragePath = null;
    const DRAWING_BUCKET = "inspection-drawings";

    function isSupabaseConfigured(){
      const urlOk = SUPABASE_URL && !String(SUPABASE_URL).includes("YOUR_SUPABASE");
      const keyOk = SUPABASE_ANON_KEY && !String(SUPABASE_ANON_KEY).includes("YOUR_SUPABASE");
      return !!(urlOk && keyOk);
    }

    function isSupabaseSdkReady(){
      return typeof window.supabase !== "undefined" && typeof window.supabase.createClient === "function";
    }

    function getSupabase(){
      if(!isSupabaseSdkReady()){
        throw new Error("Supabase SDKが読み込まれていません。ページを再読み込みしてください。");
      }
      if(!isSupabaseConfigured()){
        throw new Error("SUPABASE_URL と SUPABASE_ANON_KEY を index.html 内で設定してください。");
      }
      if(!supabaseClient){
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return supabaseClient;
    }

    function setCloudStatus(text, level){
      const el = $("cloudStatus");
      el.textContent = text;
      el.classList.remove("cloud-ok","cloud-warn","cloud-err");
      if(level === "ok") el.classList.add("cloud-ok");
      else if(level === "warn") el.classList.add("cloud-warn");
      else if(level === "err") el.classList.add("cloud-err");
    }

    function updateCloudCurrentIdLabel(){
      const el = $("cloudCurrentId");
      el.textContent = currentInspectionId
        ? `（編集中: ${currentInspectionId.slice(0,8)}…）`
        : "（新規・未保存）";
    }

    function showCloudError(title, err){
      const parts = [];
      if(err?.message) parts.push(err.message);
      if(err?.details) parts.push(err.details);
      if(err?.hint) parts.push("hint: " + err.hint);
      if(err?.code) parts.push("code: " + err.code);
      const msg = parts.length ? parts.join("\n") : String(err);
      console.error(title, err);
      toast("【エラー】" + title + "\n" + msg);
      setCloudStatus("エラー", "err");
    }

    function toSafeFileName(name){
      const src = String(name || "drawing.pdf");
      const base = src.replace(/\.pdf$/i, "");
      const normalized = base.normalize("NFKC");
      const safe = normalized
        .replace(/[\\\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "_")
        .replace(/[^\w.-]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "");
      return (safe || "drawing") + ".pdf";
    }

    function nowStamp(){
      return new Date().toISOString().replace(/[-:.TZ]/g, "");
    }

    function resolvePdfIdentity(bg){
      if(!bg || bg.kind !== "pdf") return null;
      return bg.drawingId || bg.pdfId || null;
    }

    function activeBgForCloud(){
      const bg = store.activeBg || { kind:"none" };
      return { ...bg, pageCache:{} };
    }

    function markersByKeyForCloud(){
      const out = {};
      const src = store.markersByKey || {};
      for(const [key, arr] of Object.entries(src)){
        if(!Array.isArray(arr)) continue;
        out[key] = arr.map(m=>({
          id: m.id,
          x: m.x, y: m.y, dx: m.dx, dy: m.dy,
          type: m.type,
          vendor: m.vendor,
          vendor_id: m.vendor_id || null,
          vendor_name: m.vendor_name || m.vendor || "",
          vendor_source: m.vendor_source || "auto",
          vendor_manual_override: !!m.vendor_manual_override,
          original_auto_vendor_id: m.original_auto_vendor_id || null,
          original_auto_vendor_name: m.original_auto_vendor_name || null,
          is_common: !!m.is_common,
          is_vendor_unassigned: !!m.is_vendor_unassigned,
          memo: m.memo || "",
          createdAt: m.createdAt,
          bubbleMoved: !!m.bubbleMoved,
        }));
      }
      return out;
    }

    function parseMarkerKey(key){
      if(key === "template") return { page_number: 0, pdfId: null, markerKey: "template" };
      const m = /^pdf:([^:]+):(\d+)$/.exec(key);
      if(m) return { page_number: parseInt(m[2],10), pdfId: m[1], markerKey: key };
      return { page_number: 1, pdfId: null, markerKey: key };
    }

    function markerKeyFromRow(row){
      if(row.drawing_id && row.page_number > 0) return `pdf:${row.drawing_id}:${row.page_number}`;
      if(row.marker_data?.drawingId && row.page_number > 0) return `pdf:${row.marker_data.drawingId}:${row.page_number}`;
      if(row.marker_data?.markerKey) return row.marker_data.markerKey;
      const pdfId = row.marker_data?.pdfId;
      if(pdfId != null && row.page_number > 0) return `pdf:${pdfId}:${row.page_number}`;
      if(row.page_number === 0) return "template";
      return "template";
    }

    function remapMarkersPdfIdentity(oldId, newId){
      if(!oldId || !newId || oldId === newId) return;
      const mbk = store.markersByKey || {};
      const entries = Object.entries(mbk);
      entries.forEach(([key, arr])=>{
        const m = /^pdf:([^:]+):(\d+)$/.exec(key);
        if(!m) return;
        if(m[1] !== String(oldId)) return;
        const nextKey = `pdf:${newId}:${m[2]}`;
        if(!Array.isArray(mbk[nextKey])) mbk[nextKey] = [];
        if(Array.isArray(arr)) mbk[nextKey].push(...arr);
        delete mbk[key];
      });
    }

    function buildMarkerRows(inspectionId){
      const rows = [];
      const mbk = store.markersByKey || {};
      const bg = store.activeBg || { kind:"none" };
      const activeDrawingId = bg.kind === "pdf" ? (bg.drawingId || currentDrawingId || null) : null;
      const activePdfIdentity = resolvePdfIdentity(bg);
      for(const [key, arr] of Object.entries(mbk)){
        if(!Array.isArray(arr)) continue;
        const { page_number, pdfId, markerKey } = parseMarkerKey(key);
        const markerDrawingId = (pdfId && activeDrawingId && pdfId === activePdfIdentity)
          ? activeDrawingId
          : (pdfId === activeDrawingId ? activeDrawingId : null);
        arr.forEach((m, idx)=>{
          rows.push({
            inspection_id: inspectionId,
            drawing_id: markerDrawingId,
            page_number,
            local_marker_id: m.id,
            x: Number(m.x),
            y: Number(m.y),
            dx: Number(m.dx),
            dy: Number(m.dy),
            type: m.type || "",
            vendor_name: m.vendor_name || m.vendor || "",
            vendor_status: m.vendor_source || "assigned",
            floor_label: null,
            memo: m.memo || "",
            is_common: !!m.is_common,
            is_vendor_unassigned: !!m.is_vendor_unassigned,
            bubble_moved: !!m.bubbleMoved,
            sort_order: idx,
            marker_data: {
              markerKey,
              drawingId: markerDrawingId,
              pdfId,
              createdAt: m.createdAt || Date.now(),
              vendor_id: m.vendor_id || null,
              vendor_name: m.vendor_name || m.vendor || "",
              vendor_source: m.vendor_source || "auto",
              vendor_manual_override: !!m.vendor_manual_override,
              original_auto_vendor_id: m.original_auto_vendor_id || null,
              original_auto_vendor_name: m.original_auto_vendor_name || null,
              is_common: !!m.is_common,
              is_vendor_unassigned: !!m.is_vendor_unassigned,
              version: 1,
            },
          });
        });
      }
      return rows;
    }

    function markerRowsToMarkersByKey(rows, settingsFallback){
      if(rows && rows.length > 0){
        const mbk = {};
        rows.forEach(row=>{
          const key = markerKeyFromRow(row);
          if(!mbk[key]) mbk[key] = [];
          const md = row.marker_data || {};
          mbk[key].push({
            id: row.local_marker_id || md.id || newId(),
            x: Number(row.x),
            y: Number(row.y),
            dx: Number(row.dx),
            dy: Number(row.dy),
            type: row.type || "",
            vendor: row.vendor_name || md.vendor_name || "",
            vendor_id: md.vendor_id || null,
            vendor_name: row.vendor_name || md.vendor_name || "",
            vendor_source: md.vendor_source || row.vendor_status || "auto",
            vendor_manual_override: !!md.vendor_manual_override,
            original_auto_vendor_id: md.original_auto_vendor_id || null,
            original_auto_vendor_name: md.original_auto_vendor_name || null,
            is_common: !!row.is_common || !!md.is_common,
            is_vendor_unassigned: !!row.is_vendor_unassigned || !!md.is_vendor_unassigned,
            memo: row.memo || "",
            createdAt: md.createdAt || Date.now(),
            bubbleMoved: !!row.bubble_moved,
          });
        });
        normalizeMarkersByKey(mbk);
        return mbk;
      }
      if(settingsFallback && typeof settingsFallback === "object"){
        const mbk = structuredClone(settingsFallback);
        normalizeMarkersByKey(mbk);
        return mbk;
      }
      return {};
    }

    function readInspectionForm(){
      const bg = store.activeBg || { kind:"none" };
      const inspectedRaw = $("inpInspectedAt").value;
      return {
        title: ($("inpTitle").value || "").trim() || "無題の検査",
        property_name: ($("inpPropertyName").value || "").trim() || null,
        site_name: ($("inpSiteName").value || "").trim() || null,
        building_name: ($("inpBuildingName").value || "").trim() || null,
        inspected_at: inspectedRaw ? new Date(inspectedRaw + "T00:00:00").toISOString() : null,
        inspector_name: ($("inpInspectorName").value || "").trim() || null,
        current_drawing_id: (bg.kind === "pdf")
          ? (bg.drawingId || currentDrawingId || null)
          : null,
        current_page: bg.kind === "pdf" ? (bg.page || 1) : 1,
        settings: {
          version: 1,
          activeBg: activeBgForCloud(),
          markersByKey: markersByKeyForCloud(),
          normalRotation: normalRotation || 0,
        },
        status: "draft",
      };
    }

    function applyInspectionForm(insp){
      $("inpTitle").value = insp.title || "";
      $("inpPropertyName").value = insp.property_name || "";
      $("inpSiteName").value = insp.site_name || "";
      $("inpBuildingName").value = insp.building_name || "";
      $("inpInspectorName").value = insp.inspector_name || "";
      if(insp.inspected_at){
        try{
          $("inpInspectedAt").value = new Date(insp.inspected_at).toISOString().slice(0,10);
        }catch(_){
          $("inpInspectedAt").value = "";
        }
      }else{
        $("inpInspectedAt").value = "";
      }
    }

    function applyLoadedInspectionToStore(insp, markerRows){
      const settings = insp.settings || {};
      if(settings.activeBg){
        const prevCache = store.activeBg?.pageCache;
        store.activeBg = { ...settings.activeBg, pageCache: prevCache || {} };
      }
      if(insp.current_drawing_id){
        currentDrawingId = insp.current_drawing_id;
        if(store.activeBg?.kind === "pdf"){
          store.activeBg.drawingId = insp.current_drawing_id;
          store.activeBg.pdfId = String(insp.current_drawing_id);
        }
      }
      store.markersByKey = markerRowsToMarkersByKey(
        markerRows,
        settings.markersByKey
      );
      normalizeAllMarkersInStore();
      if(insp.current_page && store.activeBg?.kind === "pdf"){
        store.activeBg.page = insp.current_page;
        $("pageInput").value = String(insp.current_page);
      }
      if(typeof settings.normalRotation === "number"){
        normalRotation = settings.normalRotation;
      }
      store.version = 1;
    }

    function refreshUiAfterDataChange(){
      closeQuickMarkerEditor({ keepDraft: false, suppressSync: true });
      selectedId = null;
      saveStore();
      updatePageInfo();
      redrawBackground();
      redrawOverlay();
      redrawList();
      syncButtons();
      syncSelectorsFromSelectedMarker();
      if(isFullscreen) updateFsInfo();
      updateCloudCurrentIdLabel();
    }

    async function uploadPdfToSupabase(file){
      const inspectionId = currentInspectionId;
      if(!inspectionId) throw new Error("inspection_id が未確定です。先に案件を作成してください。");
      if(!file) throw new Error("PDFファイルが選択されていません。");
      const sb = getSupabase();
      const safeName = toSafeFileName(file.name || "drawing.pdf");
      const storagePath = `inspections/${inspectionId}/drawings/${nowStamp()}_${safeName}`;
      const uploadRes = await sb.storage.from(DRAWING_BUCKET).upload(storagePath, file, {
        contentType: file.type || "application/pdf",
        upsert: false,
      });
      if(uploadRes.error) throw uploadRes.error;
      return storagePath;
    }

    async function saveDrawingRecord(file, storagePath, pdfMeta){
      const inspectionId = currentInspectionId;
      if(!inspectionId) throw new Error("inspection_id が未確定です。");
      const sb = getSupabase();
      const insertPayload = {
        inspection_id: inspectionId,
        file_name: file?.name || "drawing.pdf",
        mime_type: file?.type || "application/pdf",
        storage_path: storagePath,
        pdf_id: String(pdfMeta?.pdf_id || ""),
        page_count: Number(pdfMeta?.page_count || 1),
        width: Number(pdfMeta?.width || 0),
        height: Number(pdfMeta?.height || 0),
        metadata: pdfMeta?.metadata || {},
      };
      const { data, error } = await sb.from("drawings")
        .insert(insertPayload)
        .select("id")
        .single();
      if(error) throw error;
      return data.id;
    }

    async function ensureCloudDrawingSaved(){
      const bg = store.activeBg || { kind:"none" };
      if(bg.kind !== "pdf") return null;
      if(bg.drawingId || currentDrawingId) return bg.drawingId || currentDrawingId;
      if(!lastPdfFile) return null;
      if(!currentInspectionId){
        throw new Error("案件IDがありません。先に案件情報を保存してください。");
      }

      const pdf = await getCachedPdfDoc(lastPdfFile);
      const first = await pdf.getPage(1);
      const vp = first.getViewport({ scale: 1 });
      const tempPdfId = resolvePdfIdentity(bg) || randomPdfId();
      const pdfMeta = {
        pdf_id: tempPdfId,
        page_count: Number(pdf.numPages || 1),
        width: Number(vp.width || 0),
        height: Number(vp.height || 0),
        metadata: {
          source: "web",
          uploaded_at: new Date().toISOString(),
        },
      };

      const storagePath = await uploadPdfToSupabase(lastPdfFile);
      const drawingId = await saveDrawingRecord(lastPdfFile, storagePath, pdfMeta);

      const sb = getSupabase();
      const { error: upErr } = await sb.from("inspections")
        .update({ current_drawing_id: drawingId })
        .eq("id", currentInspectionId);
      if(upErr) throw upErr;

      currentDrawingId = drawingId;
      currentDrawingStoragePath = storagePath;
      if(store.activeBg?.kind === "pdf"){
        const oldIdentity = resolvePdfIdentity(store.activeBg);
        remapMarkersPdfIdentity(oldIdentity, String(drawingId));
        store.activeBg.drawingId = drawingId;
        store.activeBg.pdfId = String(drawingId);
      }
      saveStore();
      return drawingId;
    }

    async function loadPdfFromSupabaseDrawing(drawingId, targetPage){
      const sb = getSupabase();
      const { data: drawing, error: dErr } = await sb.from("drawings")
        .select("*")
        .eq("id", drawingId)
        .single();
      if(dErr) throw dErr;
      if(!drawing?.storage_path){
        throw new Error("drawings.storage_path が未設定です。");
      }

      const dlRes = await sb.storage.from(DRAWING_BUCKET).download(drawing.storage_path);
      if(dlRes.error) throw dlRes.error;
      const blob = dlRes.data;
      if(!blob) throw new Error("StorageからPDFを取得できませんでした。");

      const fileLike = new File([blob], drawing.file_name || "drawing.pdf", {
        type: drawing.mime_type || "application/pdf"
      });
      lastPdfFile = fileLike;
      currentDrawingId = drawing.id;
      currentDrawingStoragePath = drawing.storage_path;
      const startPage = Number.isFinite(targetPage) ? Number(targetPage) : 1;
      await setPdfBackground(fileLike, {
        pdfId: String(drawing.id),
        drawingId: drawing.id,
        page: startPage,
        silent: true,
        rethrowOnError: true,
      });
      redrawBackground();
      redrawOverlay();
      redrawList();
      return drawing;
    }

    async function saveMarkersToCloud(inspectionId){
      const sb = getSupabase();
      const { error: delErr } = await sb.from("markers")
        .delete()
        .eq("inspection_id", inspectionId);
      if(delErr) throw delErr;
      const markerRows = buildMarkerRows(inspectionId);
      if(markerRows.length > 0){
        const { error: insErr } = await sb.from("markers").insert(markerRows);
        if(insErr) throw insErr;
      }
      return markerRows.length;
    }

    async function loadInspectionWithDrawingAndMarkers(inspectionId){
      if(!inspectionId){
        toast("【確認】一覧から案件を選択するか、行の「読込」を押してください。");
        return;
      }
      try{
        const sb = getSupabase();
        const { data: insp, error: iErr } = await sb.from("inspections")
          .select("*")
          .eq("id", inspectionId)
          .single();
        if(iErr) throw iErr;

        const { data: markerRows, error: mErr } = await sb.from("markers")
          .select("*")
          .eq("inspection_id", inspectionId)
          .order("sort_order", { ascending: true });
        if(mErr) throw mErr;

        currentInspectionId = inspectionId;
        selectedCloudInspectionId = inspectionId;
        currentDrawingId = insp.current_drawing_id || null;
        if(!currentDrawingId) currentDrawingStoragePath = null;
        applyInspectionForm(insp);
        applyLoadedInspectionToStore(insp, markerRows || []);

        if(insp.current_drawing_id){
          try{
            await loadPdfFromSupabaseDrawing(insp.current_drawing_id, insp.current_page || 1);
            if(store.activeBg?.kind === "pdf"){
              store.activeBg.kind = "pdf";
            }
          }catch(e){
            showCloudError("PDF図面の復元", e);
            toast("PDFの復元に失敗しました。再アップロードしてください");
          }
        }

        refreshUiAfterDataChange();
        const n = Object.values(store.markersByKey || {}).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);
        toast(`クラウド読み込み完了。\n${insp.title || "無題"}\nマーカー合計: ${n}件`);
        setCloudStatus("読込済", "ok");
        renderCloudInspectionList(lastCloudListCache);
      }catch(e){
        showCloudError("クラウド読み込み", e);
      }
    }

    async function testSupabaseConnection(){
      try{
        if(!isSupabaseConfigured()){
          setCloudStatus("未設定", "warn");
          toast("【確認】SUPABASE_URL と SUPABASE_ANON_KEY を設定してください。");
          return;
        }
        const sb = getSupabase();
        const { error } = await sb.from("inspections").select("id").limit(1);
        if(error) throw error;
        setCloudStatus("接続OK", "ok");
        toast("Supabase接続に成功しました。");
        await loadCategoryVendorMappings();
        await refreshCloudInspectionList();
      }catch(e){
        showCloudError("Supabase接続確認", e);
      }
    }

    async function createNewInspection(){
      const ok = confirm(
        "新規検査案件を開始します。\n未保存の変更はクラウドに残りませんが、端末内データは上書きされます。\nよろしいですか？"
      );
      if(!ok) return;
      currentInspectionId = null;
      selectedCloudInspectionId = null;
      currentDrawingId = null;
      currentDrawingStoragePath = null;
      store = structuredClone(defaultStore);
      normalRotation = 0;
      selectedId = null;
      filterVendor = "";
      $("filterVendor").value = "";
      $("memoInput").value = "";
      $("inpTitle").value = "";
      $("inpPropertyName").value = "";
      $("inpSiteName").value = "";
      $("inpBuildingName").value = "";
      $("inpInspectedAt").value = "";
      $("inpInspectorName").value = "";
      refreshUiAfterDataChange();
      toast("新規検査案件を開始しました。PDFを選択して指摘を追加できます。");
    }

    async function saveToCloud(){
      try{
        if(normalizeAllMarkersInStore()) saveStore();
        const sb = getSupabase();
        let payload = readInspectionForm();
        let inspectionId = currentInspectionId;

        if(!inspectionId){
          const { data, error } = await sb.from("inspections")
            .insert(payload)
            .select("id")
            .single();
          if(error) throw error;
          inspectionId = data.id;
          currentInspectionId = inspectionId;
        }

        await ensureCloudDrawingSaved();
        payload = readInspectionForm();
        const { error: updErr } = await sb.from("inspections")
          .update(payload)
          .eq("id", inspectionId);
        if(updErr) throw updErr;

        const n = await saveMarkersToCloud(inspectionId);

        saveStore();
        setCloudStatus("保存済", "ok");
        toast(`クラウド保存しました。\n案件ID: ${inspectionId}\nマーカー: ${n}件`);
        updateCloudCurrentIdLabel();
        await refreshCloudInspectionList();
      }catch(e){
        showCloudError("クラウド保存", e);
      }
    }

    async function loadFromCloud(inspectionId){
      await loadInspectionWithDrawingAndMarkers(inspectionId);
    }

    let lastCloudListCache = [];

    function renderCloudInspectionList(items){
      const list = $("cloudInspectionList");
      list.innerHTML = "";
      if(!items || items.length === 0){
        const empty = document.createElement("div");
        empty.className = "cloud-list-item";
        empty.style.cursor = "default";
        empty.style.color = "var(--muted)";
        empty.textContent = "保存済みの検査案件はありません";
        list.appendChild(empty);
        return;
      }
      items.forEach(insp=>{
        const div = document.createElement("div");
        div.className = "cloud-list-item" + (insp.id === selectedCloudInspectionId ? " sel" : "");
        div.dataset.id = insp.id;
        const dt = insp.updated_at || insp.created_at;
        const sub = [
          insp.property_name,
          insp.status,
          dt ? new Date(dt).toLocaleString() : "",
        ].filter(Boolean).join(" / ");
        div.innerHTML = `
          <div class="cloud-list-meta">
            <div class="cloud-list-title">${escapeHtml(insp.title || "無題")}</div>
            <div class="cloud-list-sub">${escapeHtml(sub)}</div>
          </div>
          <button class="btn" type="button" data-act="load-one" style="padding:6px 10px;font-size:12px">読込</button>
        `;
        div.addEventListener("click", (e)=>{
          if(e.target.closest('button[data-act="load-one"]')) return;
          selectedCloudInspectionId = insp.id;
          renderCloudInspectionList(lastCloudListCache);
        });
        div.querySelector('[data-act="load-one"]').addEventListener("click", (e)=>{
          e.stopPropagation();
          loadFromCloud(insp.id);
        });
        list.appendChild(div);
      });
    }

    function isActiveStatus(value){
      if(value == null) return true;
      const v = String(value).toLowerCase();
      return v === "active" || v === "enabled" || v === "1" || v === "true";
    }

    function compareByDisplayOrder(a, b){
      const ao = Number.isFinite(Number(a.display_order)) ? Number(a.display_order) : 9999;
      const bo = Number.isFinite(Number(b.display_order)) ? Number(b.display_order) : 9999;
      if(ao !== bo) return ao - bo;
      return String(a.name || "").localeCompare(String(b.name || ""), "ja");
    }

    function ensureSpecialVendors(vendors){
      const out = Array.isArray(vendors) ? [...vendors] : [];
      if(!out.some(v=>v.name === "全業者")){
        out.unshift({ id: "ALL_VENDORS", name: "全業者", display_order: 0, status: "active" });
      }
      if(!out.some(v=>v.name === "業者未定")){
        out.push({ id: "UNASSIGNED_VENDOR", name: "業者未定", display_order: 999, status: "active" });
      }
      return out;
    }

    function renderCategorySelects(){
      const list = inspectionCategories.length ? inspectionCategories : FALLBACK_CATEGORIES;
      const html = list.map(c=>`<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join("");
      $("typeSelect").innerHTML = html;
      $("fsTypeSelect").innerHTML = html;

    function renderVendorSelects(){

      $("vendorSelect").innerHTML = vendorHtml;

        .join("");

        $("vendorSelect").value = activeVendors[0]?.name || "業者未定";
      }
      syncFsSelects();
