    function setMappingPanelStatus(text, kind){
      const el = $("mappingPanelStatus");
      el.textContent = text;
      el.style.color = kind === "error" ? "#991b1b" : kind === "ok" ? "#166534" : "var(--muted)";
    }

    function getVendorRecordByName(name){
      const list = inspectionVendors.length ? inspectionVendors : FALLBACK_VENDORS;
      return list.find(v=>v.name === name) || null;
    }

    function getVendorDisplayName(marker){
      if(marker.is_common || marker.vendor_source === "common" || marker.vendor_name === "全業者") return "全業者";
      if(marker.is_vendor_unassigned || marker.vendor_source === "unassigned" || marker.vendor_name === "業者未定") return "業者未定";
      return marker.vendor_name || marker.vendor || "";
    }

    function updateVendorStateLabel(marker){
      const label = $("vendorStateLabel");
      if(!label) return;
      if(marker){
        if(marker.is_common || marker.vendor_source === "common"){
          label.textContent = "共通：全業者";
        }else if(marker.is_vendor_unassigned || marker.vendor_source === "unassigned"){
          label.textContent = "業者未定";
        }else if(marker.vendor_manual_override || marker.vendor_source === "manual"){
          label.textContent = "手動変更済み";
        }else{
          label.textContent = `自動：${getVendorDisplayName(marker) || "-"}`;
        }
        return;
      }
      const t = $("typeSelect").value || "";
      if(t === "共通"){
        label.textContent = "共通：全業者";
      }else{
        label.textContent = `自動：${$("vendorSelect").value || "-"}`;
      }
    }

    async function loadCategoryVendorMappings(){
      try{
        let categories = [];
        let vendors = [];
        if(isSupabaseConfigured()){
          const sb = getSupabase();
          const [catRes, vendorRes] = await Promise.all([
            sb.from("inspection_categories")
              .select("id,name,default_vendor_id,default_vendor_name,auto_assign_enabled,display_order,status")
              .eq("status", "active")
              .order("display_order", { ascending: true }),
            sb.from("inspection_vendors")
              .select("id,name,display_order,status")
              .eq("status", "active")
              .order("display_order", { ascending: true }),
          ]);
          if(catRes.error) throw catRes.error;
          if(vendorRes.error) throw vendorRes.error;
          categories = (catRes.data || []).filter(c=>isActiveStatus(c.status) && c.name !== "確認");
          vendors = ensureSpecialVendors((vendorRes.data || []).filter(v=>isActiveStatus(v.status) && v.name !== "共通"));
        }else{
          categories = FALLBACK_CATEGORIES.filter(c=>c.name !== "確認");
          vendors = ensureSpecialVendors(FALLBACK_VENDORS.filter(v=>v.name !== "共通"));
        }
        categories.sort(compareByDisplayOrder);
        vendors.sort(compareByDisplayOrder);
        inspectionCategories = categories;
        inspectionVendors = vendors;
        categoryVendorMappingsByName = {};
        categories.forEach(c=>{
          categoryVendorMappingsByName[c.name] = {
            id: c.id,
            category_name: c.name,
            default_vendor_id: c.name === "共通" ? "ALL_VENDORS" : (c.default_vendor_id || getVendorRecordByName(c.default_vendor_name || "")?.id || null),
            default_vendor_name: c.name === "共通" ? "全業者" : (c.default_vendor_name || "業者未定"),
            auto_assign_enabled: c.auto_assign_enabled !== false,
            display_order: c.display_order,
            status: c.status || "active",
            dirty: false,
          };
        });
        renderCategorySelects();
        renderVendorSelects();
        renderCategoryVendorSettings();
        applyDefaultVendorByCategory($("typeSelect").value, null, true);
        updateVendorStateLabel();
        setMappingPanelStatus("紐づけ設定を読み込みました", "ok");
      }catch(e){
        console.error(e);
        inspectionCategories = FALLBACK_CATEGORIES.filter(c=>c.name !== "確認").sort(compareByDisplayOrder);
        inspectionVendors = ensureSpecialVendors(FALLBACK_VENDORS.filter(v=>v.name !== "共通")).sort(compareByDisplayOrder);
        categoryVendorMappingsByName = {};
        inspectionCategories.forEach(c=>{
          categoryVendorMappingsByName[c.name] = {
            id: c.id,
            category_name: c.name,
            default_vendor_id: c.name === "共通" ? "ALL_VENDORS" : c.default_vendor_id,
            default_vendor_name: c.name === "共通" ? "全業者" : c.default_vendor_name,
            auto_assign_enabled: c.auto_assign_enabled !== false,
            display_order: c.display_order,
            status: c.status || "active",
            dirty: false,
          };
        });
        renderCategorySelects();
        renderVendorSelects();
        renderCategoryVendorSettings();
        applyDefaultVendorByCategory($("typeSelect").value, null, true);
        updateVendorStateLabel();
        setMappingPanelStatus("Supabase未接続のため固定設定で動作中", "error");
      }
    }

    function renderCategoryVendorSettings(){
      const root = $("mappingSettingsList");
      const rows = inspectionCategories.length ? inspectionCategories : FALLBACK_CATEGORIES;
      const vendorOptions = (inspectionVendors.length ? inspectionVendors : FALLBACK_VENDORS)
        .filter(v=>v.name !== "共通")
        .sort(compareByDisplayOrder)
        .map(v=>`<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)}</option>`)
        .join("");
      const head = `
        <div class="mapping-grid mapping-head">
          <div>指摘種別</div>
          <div>自動</div>
          <div>標準担当業者</div>
          <div>状態</div>
        </div>
      `;
      const body = rows.map(c=>{
        const map = categoryVendorMappingsByName[c.name] || {};
        const vendorName = c.name === "共通" ? "全業者" : (map.default_vendor_name || c.default_vendor_name || "業者未定");
        const on = map.auto_assign_enabled !== false;
        const state = map.dirty ? "未保存" : "保存済み";
        return `
          <div class="mapping-row mapping-grid" data-category="${escapeHtml(c.name)}">
            <div>${escapeHtml(c.name)}</div>
            <div><input type="checkbox" data-role="auto" ${on ? "checked" : ""} ${c.name === "共通" ? "disabled" : ""}></div>
            <div class="mapping-full"><select data-role="vendor" ${c.name === "共通" ? "disabled" : ""}>${vendorOptions}</select></div>
            <div class="mapping-state" data-role="state">${state}</div>
          </div>
        `;
      }).join("");
      root.innerHTML = head + body;
      rows.forEach(c=>{
        const row = root.querySelector(`.mapping-row[data-category="${cssEscape(c.name)}"]`);
        if(!row) return;
        const vendorSelect = row.querySelector('select[data-role="vendor"]');
        const map = categoryVendorMappingsByName[c.name];
        if(vendorSelect){
          vendorSelect.value = c.name === "共通" ? "全業者" : (map?.default_vendor_name || "業者未定");
          vendorSelect.addEventListener("change", ()=>{
            const selectedName = vendorSelect.value;
            const vendor = getVendorRecordByName(selectedName);
            if(map){
              map.default_vendor_name = selectedName;
              map.default_vendor_id = vendor?.id || null;
              map.dirty = true;
            }
            row.querySelector('[data-role="state"]').textContent = "未保存";
            mappingPanelDirty = true;
            setMappingPanelStatus("未保存の変更があります", "warn");
          });
        }
        const autoChk = row.querySelector('input[data-role="auto"]');
        if(autoChk){
          autoChk.addEventListener("change", ()=>{
            if(map){
              map.auto_assign_enabled = !!autoChk.checked;
              map.dirty = true;
            }
            row.querySelector('[data-role="state"]').textContent = "未保存";
            mappingPanelDirty = true;
            setMappingPanelStatus("未保存の変更があります", "warn");
          });
        }
      });
    }

    async function saveCategoryVendorMappings(){
      const changed = Object.values(categoryVendorMappingsByName).filter(m=>m.dirty);
      if(changed.length === 0){
        setMappingPanelStatus("未保存の変更はありません", "ok");
        return;
      }
      if(!isSupabaseConfigured()){
        setMappingPanelStatus("Supabase未接続のため保存できません（画面反映のみ）", "error");
        changed.forEach(m=>{ m.dirty = false; });
        renderCategoryVendorSettings();
        return;
      }
      try{
        const sb = getSupabase();
        for(const map of changed){
          const payload = {
            default_vendor_id: map.category_name === "共通" ? "ALL_VENDORS" : map.default_vendor_id,
            default_vendor_name: map.category_name === "共通" ? "全業者" : map.default_vendor_name,
            auto_assign_enabled: map.category_name === "共通" ? true : !!map.auto_assign_enabled,
          };
          const { error } = await sb.from("inspection_categories")
            .update(payload)
            .eq("id", map.id);
          if(error) throw error;
          map.dirty = false;
        }
        mappingPanelDirty = false;
        renderCategoryVendorSettings();
        setMappingPanelStatus("紐づけ設定を保存しました", "ok");
        applyDefaultVendorByCategory($("typeSelect").value, null, true);
        updateVendorStateLabel();
      }catch(e){
        console.error(e);
        setMappingPanelStatus("保存に失敗しました。接続と権限を確認してください", "error");
      }
    }

    function getDefaultVendorForCategory(categoryName){
      if(categoryName === "共通"){
        return { id: "ALL_VENDORS", name: "全業者", source: "common", auto_assign_enabled: true };
      }
      const map = categoryVendorMappingsByName[categoryName];
      if(!map) return { id: "UNASSIGNED_VENDOR", name: "業者未定", source: "unassigned", auto_assign_enabled: false };
      if(map.auto_assign_enabled === false){
        return { id: "UNASSIGNED_VENDOR", name: "業者未定", source: "unassigned", auto_assign_enabled: false };
      }
      return {
        id: map.default_vendor_id || getVendorRecordByName(map.default_vendor_name || "")?.id || null,
        name: map.default_vendor_name || "業者未定",
        source: "auto",
        auto_assign_enabled: true,
      };
    }

    function applyDefaultVendorByCategory(categoryName, targetMarker, force = false){
      const vendor = getDefaultVendorForCategory(categoryName);
      if(targetMarker && targetMarker.vendor_manual_override && !force) return false;
      const marker = targetMarker || null;
      if(categoryName === "共通"){
        if(marker){
          marker.type = "共通";
          marker.vendor = "全業者";
          marker.vendor_id = "ALL_VENDORS";
          marker.vendor_name = "全業者";
          marker.vendor_source = "common";
          marker.vendor_manual_override = false;
          marker.original_auto_vendor_id = "ALL_VENDORS";
          marker.original_auto_vendor_name = "全業者";
          marker.is_common = true;
          marker.is_vendor_unassigned = false;
        }
        $("vendorSelect").value = "全業者";
        $("fsVendorSelect").value = "全業者";
        updateVendorStateLabel(marker);
        return true;
      }
      if(vendor.source === "unassigned" || vendor.name === "業者未定"){
        if(marker){
          marker.type = categoryName;
          marker.vendor = "業者未定";
          marker.vendor_id = "UNASSIGNED_VENDOR";
          marker.vendor_name = "業者未定";
          marker.vendor_source = "unassigned";
          marker.vendor_manual_override = false;
          marker.original_auto_vendor_id = "UNASSIGNED_VENDOR";
          marker.original_auto_vendor_name = "業者未定";
          marker.is_common = false;
          marker.is_vendor_unassigned = true;
        }
        $("vendorSelect").value = "業者未定";
        $("fsVendorSelect").value = "業者未定";
        updateVendorStateLabel(marker);
        return true;
      }
      if(marker){
        marker.type = categoryName;
        marker.vendor = vendor.name;
        marker.vendor_id = vendor.id;
        marker.vendor_name = vendor.name;
        marker.vendor_source = "auto";
        marker.vendor_manual_override = false;
        marker.original_auto_vendor_id = vendor.id;
        marker.original_auto_vendor_name = vendor.name;
        marker.is_common = false;
        marker.is_vendor_unassigned = false;
      }
      $("vendorSelect").value = vendor.name;
      $("fsVendorSelect").value = vendor.name;
      updateVendorStateLabel(marker);
      return true;
    }

    function markVendorManualOverride(targetMarker){
      if(!targetMarker) return;
      if(targetMarker.type === "共通"){
        applyDefaultVendorByCategory("共通", targetMarker, true);
        return;
      }
      const selectedName = $("vendorSelect").value || "業者未定";
      const vendor = getVendorRecordByName(selectedName);
      targetMarker.vendor = selectedName;
      targetMarker.vendor_id = vendor?.id || (selectedName === "業者未定" ? "UNASSIGNED_VENDOR" : null);
      targetMarker.vendor_name = selectedName;
      if(selectedName === "業者未定"){
        targetMarker.vendor_source = "unassigned";
        targetMarker.vendor_manual_override = false;
        targetMarker.is_vendor_unassigned = true;
      }else{
        targetMarker.vendor_source = "manual";
        targetMarker.vendor_manual_override = true;
        targetMarker.is_vendor_unassigned = false;
      }
      targetMarker.is_common = false;
      updateVendorStateLabel(targetMarker);
    }

    function normalizeMarkerVendorState(marker){
      if(!marker || typeof marker !== "object") return false;
      const before = JSON.stringify({
        vendor: marker.vendor,
        vendor_id: marker.vendor_id,
        vendor_name: marker.vendor_name,
        vendor_source: marker.vendor_source,
        vendor_manual_override: marker.vendor_manual_override,
        original_auto_vendor_id: marker.original_auto_vendor_id,
        original_auto_vendor_name: marker.original_auto_vendor_name,
        is_common: marker.is_common,
        is_vendor_unassigned: marker.is_vendor_unassigned,
      });
      if(marker.vendor_name === "共通"){
        marker.vendor_name = "全業者";
        marker.vendor = "全業者";
      }
      if(marker.type === "共通" || marker.vendor_name === "全業者" || marker.vendor_source === "common"){
        marker.vendor = "全業者";
        marker.vendor_name = "全業者";
        marker.vendor_id = "ALL_VENDORS";
        marker.vendor_source = "common";
        marker.vendor_manual_override = false;
        marker.original_auto_vendor_name = "全業者";
        marker.original_auto_vendor_id = "ALL_VENDORS";
        marker.is_common = true;
        marker.is_vendor_unassigned = false;
      }else if(marker.vendor_name === "業者未定" || marker.vendor === "業者未定" || marker.vendor_source === "unassigned"){
        marker.vendor = "業者未定";
        marker.vendor_name = "業者未定";
        marker.vendor_id = "UNASSIGNED_VENDOR";
        marker.vendor_source = "unassigned";
        marker.vendor_manual_override = false;
        marker.is_common = false;
        marker.is_vendor_unassigned = true;
      }else if(marker.vendor_source === "manual" || marker.vendor_manual_override){
        marker.vendor_source = "manual";
        marker.vendor_manual_override = true;
        marker.is_common = false;
        marker.is_vendor_unassigned = !(marker.vendor_name || marker.vendor);
        marker.vendor_name = marker.vendor_name || marker.vendor || "";
        marker.vendor = marker.vendor_name;
        if(!marker.vendor_id){
          marker.vendor_id = getVendorRecordByName(marker.vendor_name || "")?.id || null;
        }
      }else{
        const vName = marker.vendor_name || marker.vendor || "";
        const vendor = getVendorRecordByName(vName);
        marker.vendor = vName || "業者未定";
        marker.vendor_name = vName || "業者未定";
        marker.vendor_id = vendor?.id || (vName ? marker.vendor_id : "UNASSIGNED_VENDOR");
        marker.vendor_source = marker.vendor_source || (vName ? "auto" : "unassigned");
        marker.vendor_manual_override = !!marker.vendor_manual_override;
        marker.is_common = false;
        marker.is_vendor_unassigned = !vName;
        if(!marker.original_auto_vendor_name && marker.vendor_source === "auto"){
          marker.original_auto_vendor_name = marker.vendor_name;
          marker.original_auto_vendor_id = marker.vendor_id || null;
        }
      }
      const after = JSON.stringify({
        vendor: marker.vendor,
        vendor_id: marker.vendor_id,
        vendor_name: marker.vendor_name,
        vendor_source: marker.vendor_source,
        vendor_manual_override: marker.vendor_manual_override,
        original_auto_vendor_id: marker.original_auto_vendor_id,
        original_auto_vendor_name: marker.original_auto_vendor_name,
        is_common: marker.is_common,
        is_vendor_unassigned: marker.is_vendor_unassigned,
      });
      return before !== after;
    }

    function shouldShowMarkerForVendor(marker, selectedVendor){
      if(!selectedVendor || selectedVendor === "全て" || selectedVendor === "全業者") return true;
      if(marker.is_common || marker.vendor_source === "common" || marker.vendor_name === "全業者") return true;
      return getVendorDisplayName(marker) === selectedVendor;
    }

    function cssEscape(value){
      if(window.CSS && typeof window.CSS.escape === "function"){
        return window.CSS.escape(value);
      }
      return String(value).replace(/"/g, '\\"');
    }

    // -------------------- State --------------------
    let store = loadStore();
    let selectedId = null;
    let filterVendor = "";
    // stage measured size
    let stageW = 1, stageH = 1;

    // Bubble size (for auto arrangement collision checks)
    const BUBBLE_W = 150;
    const BUBBLE_H = 44;

    function activeKey(){
      const bg = store.activeBg;
      const pdfIdentity = resolvePdfIdentity(bg);
      if(bg?.kind === "pdf" && pdfIdentity && bg.page){
        return `pdf:${pdfIdentity}:${bg.page}`;
      }
      return "template";
    }
    function markers(){
      const key = activeKey();
      if(!store.markersByKey[key]) store.markersByKey[key] = [];
      return store.markersByKey[key];
    }

    // -------------------- Background Rendering --------------------
    const bgCanvas = $("bg");
    const ctx = bgCanvas.getContext("2d");
    const overlay = $("overlay");
    const stageWrap = $("stageWrap");
    const quickMarkerEditor = $("quickMarkerEditor");
    const QUICK_TYPE_CHIP_ORDER = ["共通","傷","汚れ","建具","設備","補修","その他"];
    let quickEditorState = null;

    function resizeStage(){
      // devicePixelRatioを考慮してcanvasを物理ピクセルサイズで確保する
      // これにより高DPI(Retina)ディスプレイでもシャープに表示される
      const dpr = window.devicePixelRatio || 1;

      const rot = (typeof fsRotation !== "undefined") ? fsRotation : 0;
      const inFs = (typeof isFullscreen !== "undefined") && isFullscreen;

      let cssW, cssH;
      if(inFs && (rot === 90 || rot === 270)){
        cssW = window.innerHeight;
        cssH = window.innerWidth;
      } else {
        const r = stageWrap.getBoundingClientRect();
        cssW = Math.max(1, Math.round(r.width));
        cssH = Math.max(1, Math.round(r.height));
      }

      // stageW/Hは論理座標系（CSS px）で持つ
      stageW = cssW;
      stageH = cssH;

      // canvasの実ピクセルをDPR倍にしてシャープにする
      // canvasの物理ピクセル数をDPR倍にしてシャープにする
      bgCanvas.width  = Math.round(cssW * dpr);
      bgCanvas.height = Math.round(cssH * dpr);
      // inset:0を使わずJS側でサイズを完全制御（CSS insetがstyle.widthを上書きするため）
      bgCanvas.style.width  = cssW + "px";
      bgCanvas.style.height = cssH + "px";
      // overlayも同様にサイズ設定
      overlay.style.width  = cssW + "px";
      overlay.style.height = cssH + "px";
      // DPR倍スケールをctxに設定（描画はCSS座標で行える）
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      overlay.setAttribute("viewBox", `0 0 ${stageW} ${stageH}`);
      redrawBackground();
      redrawOverlay();
    }
    window.addEventListener("resize", resizeStage);

    function clearBackground(){
      // PDFなし時はデフォルトのアスペクト比に戻す
      if(typeof isFullscreen === 'undefined' || !isFullscreen) stageWrap.style.aspectRatio = "16 / 9";
      ctx.clearRect(0,0,stageW,stageH);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0,0,stageW,stageH);
      ctx.strokeStyle = "#eef2f7";
      for(let x=0;x<stageW;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,stageH); ctx.stroke();}
      for(let y=0;y<stageH;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(stageW,y); ctx.stroke();}
      ctx.fillStyle = "#6b7280";
      ctx.font = "14px system-ui, sans-serif";
      ctx.fillText("背景が未設定です（PDFをアップロードしてください）", 18, 28);
    }

    // PDFのアスペクト比をstageWrapに適用する（resizeStageは呼ばない）
    function applyPdfAspectRatio(iw, ih){
      // 常に16:9横固定。縦画像はdrawImageFitで左右にレターボックス表示する。
    }

    // 通常モードの画像回転（0/90/180/270）
    let normalRotation = 0;

    // imgRect: 元画像サイズ・スケール・回転を保持（正規化された比率変換に使用）
    let imgRect = { iw: 1, ih: 1, sc: 1, rot: 0 };

    function drawImageFit(img){
      // フルスクリーン時は rot=0（CSSで回転）、通常時は normalRotation でcanvas回転
      const rot = isFullscreen ? 0 : normalRotation;
      const iw = img.width, ih = img.height;
      const cw = stageW, ch = stageH;

      // 回転後にcanvasにフィットするスケールを計算
      const swapped = (rot === 90 || rot === 270);
      const sc = Math.min(cw / (swapped ? ih : iw), ch / (swapped ? iw : ih));

      // imgRect に元画像サイズ・スケール・回転を保存
      imgRect = { iw, ih, sc, rot };

      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, cw, ch);

      // 高品質ダウンスケーリング（大きいPDF画像を縮小表示するとき重要）
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if(rot === 0){
        const dw = iw*sc, dh = ih*sc;
        ctx.drawImage(img, 0,0, iw,ih, (cw-dw)/2,(ch-dh)/2, dw,dh);
      } else {
        ctx.save();
        ctx.translate(cw/2, ch/2);
        ctx.rotate(rot * Math.PI / 180);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0,0, iw,ih, -iw*sc/2,-ih*sc/2, iw*sc,ih*sc);
        ctx.restore();
      }
    }

    // canvas座標 → 元画像の正規化比率(0-1) [回転に依存しない正規座標系]
    function canvasPxToImgRatio(px, py){
      const {iw, ih, sc, rot} = imgRect;
      // canvas中心からの相対座標
      const cx = px - stageW/2, cy = py - stageH/2;
      // 逆回転して元画像ローカル座標へ
      const rad = -rot * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const lx = (cx*cos - cy*sin) / sc;
      const ly = (cx*sin + cy*cos) / sc;
      // 比率に変換（0=左端/上端, 1=右端/下端）
      return { x: lx/iw + 0.5, y: ly/ih + 0.5 };
    }

    // 元画像の正規化比率 → canvas座標 px [回転に依存しない正規座標系]
    function imgRatioToCanvasPx(rx, ry){
      const {iw, ih, sc, rot} = imgRect;
      // 元画像ローカル座標（中心基準）
      const lx = (rx - 0.5) * iw;
      const ly = (ry - 0.5) * ih;
      // 回転してcanvas座標へ
      const rad = rot * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      return {
        x: (lx*cos - ly*sin) * sc + stageW/2,
        y: (lx*sin + ly*cos) * sc + stageH/2,
      };
    }

    // 吹き出しオフセット（画像比率座標）。ピンと吹き出しが重ならないよう補正する
    const DEFAULT_BUBBLE_DX = 0.08;
    const DEFAULT_BUBBLE_DY = -0.04;
    const MIN_BUBBLE_OFFSET_DIST = 0.03;
    const PIN_VIS_R = 7;
    const PIN_CLEAR_MARGIN = 5;
    const BUBBLE_OFFSET_CANDIDATES = [
      [0.08, -0.04],
      [-0.14, -0.04],
      [0.08, 0.07],
      [-0.14, 0.07],
      [0.08, -0.12],
      [-0.14, -0.12],
      [0.12, -0.06],
      [-0.18, -0.06],
    ];

    function canUseCanvasOffsetCheck(){
      return imgRect.iw > 10 && imgRect.ih > 10 && imgRect.sc > 0 && stageW > 1 && stageH > 1;
    }

    function bubbleOverlapsPin(m, dx, dy){
      if(!canUseCanvasOffsetCheck()) return false;
      const _a = imgRatioToCanvasPx(m.x, m.y);
      const _b = imgRatioToCanvasPx(m.x + dx, m.y + dy);
      const ax = _a.x, ay = _a.y;
      const bx = _b.x, by = _b.y;
      const pad = PIN_VIS_R + PIN_CLEAR_MARGIN;
      return (
        ax + pad > bx &&
        ax - pad < bx + BUBBLE_W &&
        ay + pad > by &&
        ay - pad < by + BUBBLE_H
      );
    }

    function bubbleMostlyOnStage(m, dx, dy){
      if(!canUseCanvasOffsetCheck()) return true;
      const _b = imgRatioToCanvasPx(m.x + dx, m.y + dy);
      const margin = 8;
      return (
        _b.x >= -margin &&
        _b.y >= -margin &&
        _b.x + BUBBLE_W <= stageW + margin &&
        _b.y + BUBBLE_H <= stageH + margin
      );
    }

    function pickDefaultBubbleOffset(m){
      const nearRight = m.x > 0.72;
      const nearLeft = m.x < 0.28;
      const nearTop = m.y < 0.15;
      const nearBottom = m.y > 0.85;
      const ordered = [...BUBBLE_OFFSET_CANDIDATES];
      const tryList = nearRight
        ? ordered.filter(([dx])=>dx < 0).concat(ordered.filter(([dx])=>dx >= 0))
        : nearLeft
          ? ordered.filter(([dx])=>dx > 0).concat(ordered.filter(([dx])=>dx <= 0))
          : ordered;
      const tryY = nearTop
        ? [...tryList].sort((a,b)=>b[1] - a[1])
        : nearBottom
          ? [...tryList].sort((a,b)=>a[1] - b[1])
          : tryList;
      for(const [dx, dy] of tryY){
        if(!bubbleOverlapsPin(m, dx, dy) && bubbleMostlyOnStage(m, dx, dy)){
          return { dx, dy };
        }
      }
      if(nearRight) return { dx: -0.14, dy: DEFAULT_BUBBLE_DY };
      if(nearTop) return { dx: DEFAULT_BUBBLE_DX, dy: 0.07 };
      if(nearBottom) return { dx: DEFAULT_BUBBLE_DX, dy: -0.12 };
      return { dx: DEFAULT_BUBBLE_DX, dy: DEFAULT_BUBBLE_DY };
    }

    function isMarkerOffsetInvalid(m){
      const dx = Number(m.dx);
      const dy = Number(m.dy);
      if(!Number.isFinite(dx) || !Number.isFinite(dy)) return true;
      if(Math.hypot(dx, dy) < MIN_BUBBLE_OFFSET_DIST) return true;
      if(canUseCanvasOffsetCheck()) return bubbleOverlapsPin(m, dx, dy);
      return false;
    }

    /** @returns {boolean} 補正した場合 true */
    function normalizeMarkerOffset(m){
      if(m.bubbleMoved && !isMarkerOffsetInvalid(m)) return false;
      const { dx, dy } = pickDefaultBubbleOffset(m);
      const changed = m.dx !== dx || m.dy !== dy;
      m.dx = dx;
      m.dy = dy;
      return changed;
    }

    function normalizeMarkersByKey(mbk){
      if(!mbk || typeof mbk !== "object") return false;
      let changed = false;
      for(const arr of Object.values(mbk)){
        if(!Array.isArray(arr)) continue;
        arr.forEach(m=>{
          if(normalizeMarkerVendorState(m)) changed = true;
          if(normalizeMarkerOffset(m)) changed = true;
        });
      }
      return changed;
    }

    function normalizeAllMarkersInStore(){
      return normalizeMarkersByKey(store.markersByKey);
    }

    function redrawBackground(){
      const bg = store.activeBg;
      if(bg?.kind === "pdf"){
        const pdfIdentity = resolvePdfIdentity(bg);
        const cacheKey = `${pdfIdentity}:${bg.page}`;
        const dataURL = bg.pageCache?.[cacheKey];
        if(dataURL){
          const img = new Image();
          img.onload = ()=>{
            // アスペクト比をまず変更し、その後サイズを再計算してから描画
            applyPdfAspectRatio(img.width, img.height);
            // DOMのレイアウト更新を待ってからcanvasサイズ再計算
            requestAnimationFrame(()=>{
              // resizeStageと同じロジックでDPR対応
              const dpr2 = window.devicePixelRatio || 1;
              const rot2 = (typeof fsRotation !== "undefined") ? fsRotation : 0;
              const inFs2 = (typeof isFullscreen !== "undefined") && isFullscreen;
              let cssW2, cssH2;
              if(inFs2 && (rot2 === 90 || rot2 === 270)){
                cssW2 = window.innerHeight; cssH2 = window.innerWidth;
              } else if(!inFs2){
                const r = stageWrap.getBoundingClientRect();
                cssW2 = Math.max(1, Math.round(r.width));
                cssH2 = Math.max(1, Math.round(r.height));
              } else {
                cssW2 = stageW; cssH2 = stageH;
              }
              stageW = cssW2; stageH = cssH2;
              bgCanvas.width  = Math.round(cssW2 * dpr2);
              bgCanvas.height = Math.round(cssH2 * dpr2);
              bgCanvas.style.width  = cssW2 + "px";
              bgCanvas.style.height = cssH2 + "px";
              overlay.style.width   = cssW2 + "px";
              overlay.style.height  = cssH2 + "px";
              ctx.setTransform(dpr2, 0, 0, dpr2, 0, 0);
              overlay.setAttribute("viewBox", `0 0 ${stageW} ${stageH}`);
              drawImageFit(img);
              redrawOverlay();
            });
          };
          img.onerror = ()=> clearBackground();
          img.src = dataURL;
        }else{
          clearBackground();
          ctx.fillStyle="#111827";
          ctx.font="14px system-ui, sans-serif";
          ctx.fillText("PDFページ画像を生成中…（少し待ってください）", 18, 50);
        }
      }else{
        clearBackground();
      }
    }

    function getMarkerById(markerId){
      if(!markerId) return null;
      for(const arr of Object.values(store.markersByKey || {})){
        if(!Array.isArray(arr)) continue;
        const found = arr.find(m=>m.id === markerId);
        if(found) return found;
      }
      return null;
    }

    function renderQuickTypeChips(selectedType){
      const host = $("quickTypeChips");
      if(!host) return;
      const set = new Set();
      const categories = inspectionCategories.length ? inspectionCategories : FALLBACK_CATEGORIES;
      QUICK_TYPE_CHIP_ORDER.forEach(v=>set.add(v));
      categories.forEach(c=>set.add(c.name));
      const chips = [...set];
      host.innerHTML = chips.map(name=>`<button type="button" class="type-chip ${name === selectedType ? "active" : ""}" data-type="${escapeHtml(name)}">${escapeHtml(name)}</button>`).join("");
    }

    function updateQuickEditorUiFromDraft(){
      if(!quickEditorState) return;
      const d = quickEditorState.draft;
      $("quickMarkerType").value = d.type || "共通";
      $("quickMarkerVendor").value = d.vendor_name || "";
      $("quickMarkerMemo").value = d.memo || "";
      renderQuickTypeChips(d.type || "共通");
    }

    function applyQuickEditorCategoryChange(categoryName, marker){
      if(!marker) return false;
      marker.type = categoryName || "共通";
      if(marker.vendor_manual_override) return false;
      if(categoryName === "共通"){
        marker.vendor_name = "";
        marker.vendor_id = null;
        marker.vendor = "";
        marker.vendor_source = "common";
        marker.is_common = true;
        marker.is_vendor_unassigned = false;
        marker.original_auto_vendor_id = "ALL_VENDORS";
        marker.original_auto_vendor_name = "全業者";
        return true;
      }
      const vendor = getDefaultVendorForCategory(categoryName);
      if(vendor.source === "unassigned" || vendor.name === "業者未定"){
        marker.vendor_name = "";
        marker.vendor_id = null;
        marker.vendor = "";
        marker.vendor_source = "unassigned";
        marker.is_vendor_unassigned = true;
        marker.is_common = false;
        return true;
      }
      marker.vendor_name = vendor.name || "";
      marker.vendor_id = vendor.id || null;
      marker.vendor = vendor.name || "";
      marker.vendor_source = "auto";
      marker.is_common = false;
      marker.is_vendor_unassigned = !vendor.name;
      marker.original_auto_vendor_id = vendor.id || null;
      marker.original_auto_vendor_name = vendor.name || "";
      return true;
    }

    function clearMarkerVendor(marker){
      if(!marker) return;
      marker.vendor_name = "";
      marker.vendor_id = null;
      marker.vendor = "";
      marker.vendor_manual_override = true;
      marker.vendor_source = "manual";
      marker.is_common = false;
      marker.is_vendor_unassigned = true;
    }

    function positionQuickEditorNearMarker(marker){
      if(!marker || !quickMarkerEditor || quickMarkerEditor.style.display === "none") return;
      const anchor = imgRatioToCanvasPx(marker.x, marker.y);
      const editorW = quickMarkerEditor.offsetWidth || 320;
      const editorH = quickMarkerEditor.offsetHeight || 240;
      const margin = 8;
      let left = anchor.x + 14;
      let top = anchor.y + 14;
      if(left + editorW > stageW - margin){
        left = anchor.x - editorW - 14;
      }
      if(top + editorH > stageH - margin){
        top = anchor.y - editorH - 14;
      }
      left = clamp(left, margin, Math.max(margin, stageW - editorW - margin));
      top = clamp(top, margin, Math.max(margin, stageH - editorH - margin));
      quickMarkerEditor.style.left = `${left}px`;
      quickMarkerEditor.style.top = `${top}px`;
    }

    function openQuickMarkerEditor(marker, options = {}){
      if(!marker) return;
      const isNew = options.isNew === true;
      closeQuickMarkerEditor({ keepDraft: false });
      quickEditorState = {
        markerId: marker.id,
        isNew,
        draft: {
          type: marker.type || "共通",
          vendor_name: marker.vendor_name || marker.vendor || "",
          memo: marker.memo || "",
          vendor_manual_override: !!marker.vendor_manual_override,
          vendor_source: marker.vendor_source || "auto",
        }
      };
      quickMarkerEditor.style.display = "block";
      updateQuickEditorUiFromDraft();
      positionQuickEditorNearMarker(marker);
      setTimeout(()=>{ try{ $("quickMarkerMemo").focus(); }catch(_){} }, 0);
    }

    function closeQuickMarkerEditor(options = {}){
      const state = quickEditorState;
      if(state && state.isNew && !options.keepDraft){
        deleteMarkerById(state.markerId, { skipCloseEditor: true });
      }
      quickEditorState = null;
      if(quickMarkerEditor) quickMarkerEditor.style.display = "none";
      if(!options.suppressSync){
        redrawOverlay();
        redrawList();
        syncButtons();
        syncSelectorsFromSelectedMarker();
      }
    }

    function createDraftMarkerAt(x, y){
      const ratio = canvasPxToImgRatio(x, y);
      const m = {
        id: newId(),
        x: ratio.x, y: ratio.y,
        dx: DEFAULT_BUBBLE_DX,
        dy: DEFAULT_BUBBLE_DY,
        type: "共通",
        vendor: "",
        vendor_id: null,
        vendor_name: "",
        vendor_source: "common",
        vendor_manual_override: false,
        original_auto_vendor_id: "ALL_VENDORS",
        original_auto_vendor_name: "全業者",
        is_common: true,
        is_vendor_unassigned: false,
        memo: "",
        createdAt: Date.now(),
        bubbleMoved: false,
      };
      normalizeMarkerOffset(m);
      markers().push(m);
      selectedId = m.id;
      redrawOverlay();
      redrawList();
      syncButtons();
      syncSelectorsFromSelectedMarker();
      openQuickMarkerEditor(m, { isNew: true });
      return m;
    }

    function saveQuickMarkerEditor(){
      if(!quickEditorState) return;
      const marker = getMarkerById(quickEditorState.markerId);
      if(!marker){
        closeQuickMarkerEditor({ suppressSync: true });
        return;
      }
      const d = quickEditorState.draft;
      marker.type = d.type || "共通";
      marker.memo = d.memo || "";
      if(marker.type === "共通"){
        marker.vendor = d.vendor_name || "全業者";
        marker.vendor_name = d.vendor_name || "全業者";
        marker.vendor_id = marker.vendor_name ? (getVendorRecordByName(marker.vendor_name)?.id || "ALL_VENDORS") : null;
        marker.vendor_source = "common";
        marker.vendor_manual_override = false;
        marker.is_common = true;
        marker.is_vendor_unassigned = false;
        marker.original_auto_vendor_id = "ALL_VENDORS";
        marker.original_auto_vendor_name = "全業者";
      }else if(!d.vendor_name){
        marker.vendor = "";
        marker.vendor_name = "";
        marker.vendor_id = null;
        marker.vendor_source = d.vendor_manual_override ? "manual" : "unassigned";
        marker.vendor_manual_override = !!d.vendor_manual_override;
        marker.is_common = false;
        marker.is_vendor_unassigned = true;
      }else{
        const vendor = getVendorRecordByName(d.vendor_name);
        marker.vendor = d.vendor_name;
        marker.vendor_name = d.vendor_name;
        marker.vendor_id = vendor?.id || null;
        marker.vendor_source = d.vendor_manual_override ? "manual" : "auto";
        marker.vendor_manual_override = !!d.vendor_manual_override;
        marker.is_common = false;
        marker.is_vendor_unassigned = false;
        if(!d.vendor_manual_override){
          marker.original_auto_vendor_id = marker.vendor_id;
          marker.original_auto_vendor_name = marker.vendor_name;
        }
      }
      normalizeMarkerVendorState(marker);
      quickEditorState = null;
      quickMarkerEditor.style.display = "none";
      selectedId = marker.id;
      saveStore();
      redrawOverlay();
      redrawList();
      syncButtons();
      syncSelectorsFromSelectedMarker();
      if(isFullscreen) updateFsInfo();
    }

    function deleteMarkerById(markerId, options = {}){
      if(!markerId) return false;
      let deleted = false;
      for(const [key, arr] of Object.entries(store.markersByKey || {})){
        if(!Array.isArray(arr)) continue;
        const idx = arr.findIndex(m=>m.id === markerId);
        if(idx >= 0){
          arr.splice(idx, 1);
          if(arr.length === 0) store.markersByKey[key] = [];
          deleted = true;
          break;
        }
      }
      if(!deleted) return false;
      if(selectedId === markerId) selectedId = null;
      if(quickEditorState && quickEditorState.markerId === markerId){
        quickEditorState = null;
        quickMarkerEditor.style.display = "none";
      }
      saveStore();
      if(!options.skipCloseEditor){
        redrawOverlay();
        redrawList();
        syncButtons();
        syncSelectorsFromSelectedMarker();
      }
      if(isFullscreen) updateFsInfo();
      return true;
    }

    // -------------------- Marker Model --------------------
    function newId(){
      return "m_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
    }

    function addMarker(x,y){
      createDraftMarkerAt(x, y);
    }

    // -------------------- SVG Overlay Rendering --------------------
    function svgEl(name, attrs={}){
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for(const [k,v] of Object.entries(attrs)) el.setAttribute(k, String(v));
      return el;
    }

    function redrawOverlay(){
      while(overlay.firstChild) overlay.removeChild(overlay.firstChild);

      const arr = markers();
      let offsetFixed = false;
      arr.forEach(m=>{
        if(normalizeMarkerOffset(m)) offsetFixed = true;
      });
      if(offsetFixed) saveStore();

      // background click target (so clicks not swallowed by elements)
      const hit = svgEl("rect", { x:0,y:0,width:stageW,height:stageH, fill:"transparent", "pointer-events":"all" });
      overlay.appendChild(hit);

      arr.forEach((m, idx)=>{
        const isSel = m.id === selectedId;
        const group = svgEl("g", { "data-id": m.id });

        // line from anchor to bubble
        // 画像比率→canvas px 変換
        const _a = imgRatioToCanvasPx(m.x, m.y);
        const ax = _a.x, ay = _a.y;
        const _b = imgRatioToCanvasPx(m.x + m.dx, m.y + m.dy);
        const bx = _b.x, by = _b.y;
        // 線の終点は吹き出しの中心（回転しても常にここに繋がる）
        const linex2 = bx + BUBBLE_W / 2;
        const liney2 = by + BUBBLE_H / 2;
        const line = svgEl("line", {
          x1: ax, y1: ay, x2: linex2, y2: liney2,
          stroke: isSel ? "#2563eb" : "#111827",
          "stroke-width": isSel ? 2.5 : 2,
          "stroke-opacity": isSel ? 0.85 : 0.65,
        });
        group.appendChild(line);

        // bubble（先に描画し、ピンを上に重ねて常に見えるようにする）
        const rot = isFullscreen ? fsRotation : 0;
        const bcx = BUBBLE_W / 2, bcy = BUBBLE_H / 2;
        const bubbleTransform = rot === 0
          ? `translate(${bx},${by})`
          : `translate(${bx},${by}) rotate(${-rot},${bcx},${bcy})`;
        const bubbleG = svgEl("g", { transform: bubbleTransform, cursor:"grab" });
        bubbleG.setAttribute("data-role","bubble");

        const bubble = svgEl("rect", { x:0,y:0,width:BUBBLE_W,height:BUBBLE_H, rx:12, ry:12, fill:"#ffffff", stroke: isSel? "#2563eb":"#e5e7eb", "stroke-width": isSel? 2.5:1.5 });
        bubbleG.appendChild(bubble);

        const title = `${idx+1}. ${getVendorDisplayName(m) || "未選択"} / ${m.type}`;
        const t1 = svgEl("text", { x:10, y:18, "font-size":"12", "font-weight":"800", fill:"#111827" });
        t1.textContent = title.length>20 ? title.slice(0,20)+"…" : title;
        bubbleG.appendChild(t1);

        const memo = (m.memo||"").trim();
        const t2 = svgEl("text", { x:10, y:34, "font-size":"11", fill:"#6b7280" });
        t2.textContent = memo ? (memo.length>22? memo.slice(0,22)+"…" : memo) : "（メモなし）";
        bubbleG.appendChild(t2);

        group.appendChild(bubbleG);

        // anchor point（吹き出しより手前＝上に描画）
        const anchor = svgEl("circle", {
          cx: ax, cy: ay, r: isSel ? 8 : 7,
          fill: "#dc2626",
          stroke: isSel ? "#2563eb" : "#ffffff",
          "stroke-width": isSel ? 3.5 : 2,
          cursor: "grab",
        });
        if(isSel) anchor.classList.add("sel");
        anchor.setAttribute("data-role","anchor");
        group.appendChild(anchor);

        overlay.appendChild(group);
      });
      if(quickEditorState){
        const target = getMarkerById(quickEditorState.markerId);
        if(target){
          positionQuickEditorNearMarker(target);
        }else{
          closeQuickMarkerEditor({ suppressSync: true });
        }
      }
      // フルスクリーン時に件数を更新
      if(typeof isFullscreen !== "undefined" && isFullscreen) updateFsInfo();
    }

    // -------------------- List Rendering --------------------
    function redrawList(){

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    // -------------------- Interactions --------------------
    function svgPointFromEvent(e){
      // フルスクリーン中はCSS回転(fsRotation)、通常時はcanvas描画回転(normalRotation)
      const rot = isFullscreen ? fsRotation : 0; // 通常モードはcanvas側で回転済みなので0扱い

      if(rot === 0){
        const rect = overlay.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) * (stageW / rect.width),
          y: (e.clientY - rect.top)  * (stageH / rect.height)
        };
      }

      // フルスクリーン回転時: stageWrapの画面上の中心 = ウィンドウ中心
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;

      // 画面座標 → 中心基準
      let dx = e.clientX - cx;
      let dy = e.clientY - cy;

      // 逆回転 (-rot degrees)
      const rad = -rot * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const rx = dx * cos - dy * sin;
      const ry = dx * sin + dy * cos;

      // 回転前のstageWrapサイズ(= stageW x stageH)に変換
      return {
        x: rx + stageW / 2,
        y: ry + stageH / 2
      };
    }

    // Dragging state
    let drag = null;
    const DRAG_THRESHOLD = 6; // ドラッグ開始までの最小移動距離(px)
    let pendingDrag = null;   // ドラッグ確定前の候補

    // ★ pointerdown を1つに統合
    overlay.addEventListener("pointerdown", (e)=>{
      if(e.button === 2) return; // 右クリック無視

      const roleEl = e.target.closest("[data-role]");
      const groupEl = e.target.closest("g[data-id]");

      if(groupEl){
        // 既存マーカー上をクリック → 選択 ＋ ドラッグ候補に登録
        const id = groupEl.getAttribute("data-id");
        selectedId = id;
        redrawOverlay();
        redrawList();
        syncButtons();
        syncSelectorsFromSelectedMarker();

        if(roleEl){
          const role = roleEl.getAttribute("data-role");
          const m = markers().find(mm=>mm.id===id);
          if(m){
            const p = svgPointFromEvent(e);
            const _base = imgRatioToCanvasPx(m.x, m.y);
            pendingDrag = {
              id, role,
              startX: p.x, startY: p.y,
              baseX: _base.x, baseY: _base.y,
              // baseDxDyはcanvas px単位（元画像ローカル×sc→回転）
              baseDx: m.dx * imgRect.iw * imgRect.sc,
              baseDy: m.dy * imgRect.ih * imgRect.sc,
              pointerId: e.pointerId
            };
            overlay.setPointerCapture(e.pointerId);
          }
        }
        e.preventDefault();
      } else {
        // 空白エリアをクリック → 仮ピン作成してクイック編集
        closeQuickMarkerEditor({ keepDraft: false });
        const p = svgPointFromEvent(e);
        createDraftMarkerAt(p.x, p.y);
        e.preventDefault();
      }
    });

    overlay.addEventListener("pointermove", (e)=>{
      // pendingDrag が一定距離動いたらドラッグ確定
      if(pendingDrag && !drag){
        const p = svgPointFromEvent(e);
        const dist = Math.hypot(p.x - pendingDrag.startX, p.y - pendingDrag.startY);
        if(dist >= DRAG_THRESHOLD){
          drag = pendingDrag;
          pendingDrag = null;
        }
      }
      if(!drag) return;

      const m = markers().find(mm=>mm.id===drag.id);
      if(!m) return;
      const p = svgPointFromEvent(e);
      const rawDx = p.x - drag.startX;
      const rawDy = p.y - drag.startY;

      if(drag.role === "anchor"){
        // アンカーはcanvas座標系のまま移動→canvasPxToImgRatioで変換
        const newPx = {
          x: clamp(drag.baseX + rawDx, 0, stageW),
          y: clamp(drag.baseY + rawDy, 0, stageH),
        };
        const r = canvasPxToImgRatio(newPx.x, newPx.y);
        m.x = clamp(r.x, 0, 1); m.y = clamp(r.y, 0, 1);
      }else if(drag.role === "bubble"){
        // 吹き出しオフセットは画像ローカル座標系なので、
        // 通常モード回転中はcanvas差分を逆回転して画像ローカルに変換する
        const nr = isFullscreen ? 0 : (normalRotation || 0);
        let ddx = rawDx, ddy = rawDy;
        if(nr !== 0){
          const rad = -nr * Math.PI / 180;
          const cos = Math.cos(rad), sin = Math.sin(rad);
          ddx = rawDx * cos - rawDy * sin;
          ddy = rawDx * sin + rawDy * cos;
        }
        // ddxはcanvas px。元画像ローカル単位に変換して比率で保存
        const isc = imgRect.iw * imgRect.sc;
        const ihc = imgRect.ih * imgRect.sc;
        m.dx = clamp(drag.baseDx + ddx, -isc, isc) / isc;
        m.dy = clamp(drag.baseDy + ddy, -ihc, ihc) / ihc;
        m.bubbleMoved = true;
      }
      redrawOverlay();
      redrawList();
      saveStore();
      e.preventDefault();
    });

    overlay.addEventListener("pointerup", (e)=>{
      if(pendingDrag){
        const tapped = { ...pendingDrag };
        // ドラッグなしで離した → キャプチャ解放のみ
        try{ overlay.releasePointerCapture(pendingDrag.pointerId); }catch(_){}
        pendingDrag = null;
        if(!drag && (tapped.role === "bubble" || tapped.role === "anchor")){
          const marker = markers().find(mm=>mm.id===tapped.id);
          if(marker){
            openQuickMarkerEditor(marker, { isNew: false });
          }
        }
      }
      if(drag){
        try{ overlay.releasePointerCapture(drag.pointerId); }catch(_){}
        drag = null;
        saveStore();
      }
      e.preventDefault();
    });

    // -------------------- PNG Export --------------------
    async function savePng(){
      if(normalizeAllMarkersInStore()) saveStore();
      const scale = 2;
      const out = document.createElement("canvas");
      out.width  = stageW * scale;
      out.height = stageH * scale;
      const octx = out.getContext("2d");

      // ── 背景 ──
      octx.fillStyle = "#ffffff";
      octx.fillRect(0, 0, out.width, out.height);
      octx.drawImage(bgCanvas, 0, 0, out.width, out.height);

      // ── マーカーをCanvas 2D APIで直接描画 ──
      const arr = markers();
      const sw = stageW * scale, sh = stageH * scale;
      const bw = BUBBLE_W * scale, bh = BUBBLE_H * scale;

      arr.forEach((m, idx) => {
        normalizeMarkerOffset(m);
        const _a = imgRatioToCanvasPx(m.x, m.y);
        const ax = _a.x * scale, ay = _a.y * scale;
        const _b = imgRatioToCanvasPx(m.x + m.dx, m.y + m.dy);
        const bx = _b.x * scale, by = _b.y * scale;

        const isSel = m.id === selectedId;

        // 線
        octx.beginPath();
        octx.moveTo(ax, ay);
        octx.lineTo(bx + bw/2, by + bh/2);
        octx.strokeStyle = isSel ? "rgba(37,99,235,0.85)" : "rgba(17,24,39,0.65)";
        octx.lineWidth = (isSel ? 2.5 : 2) * scale;
        octx.stroke();

        // 吹き出し背景（ピンより先に描画）
        const r = 12 * scale;
        octx.beginPath();
        octx.moveTo(bx + r, by);
        octx.lineTo(bx + bw - r, by);
        octx.arcTo(bx + bw, by, bx + bw, by + r, r);
        octx.lineTo(bx + bw, by + bh - r);
        octx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
        octx.lineTo(bx + r, by + bh);
        octx.arcTo(bx, by + bh, bx, by + bh - r, r);
        octx.lineTo(bx, by + r);
        octx.arcTo(bx, by, bx + r, by, r);
        octx.closePath();
        octx.fillStyle = "#ffffff";
        octx.fill();
        octx.strokeStyle = isSel ? "#2563eb" : "#e5e7eb";
        octx.lineWidth = (isSel ? 2.5 : 1.5) * scale;
        octx.stroke();

        // タイトル
        const title = `${idx+1}. ${getVendorDisplayName(m)} / ${m.type}`;
        octx.fillStyle = "#111827";
        octx.font = `bold ${12 * scale}px system-ui,sans-serif`;
        octx.fillText(
          title.length > 20 ? title.slice(0,20)+"…" : title,
          bx + 10 * scale, by + 18 * scale
        );

        // メモ
        const memo = (m.memo || "").trim();
        const memoText = memo ? (memo.length > 22 ? memo.slice(0,22)+"…" : memo) : "（メモなし）";
        octx.fillStyle = "#6b7280";
        octx.font = `${11 * scale}px system-ui,sans-serif`;
        octx.fillText(memoText, bx + 10 * scale, by + 34 * scale);

        // アンカー円（吹き出しの上に描画してピンが隠れないようにする）
        octx.beginPath();
        octx.arc(ax, ay, (isSel ? 8 : 7) * scale, 0, Math.PI * 2);
        octx.fillStyle = "#dc2626";
        octx.fill();
        octx.strokeStyle = isSel ? "#2563eb" : "#ffffff";
        octx.lineWidth = (isSel ? 3.5 : 2) * scale;
        octx.stroke();
      });

      // ── ダウンロード ──
      out.toBlob((blob) => {
        if(!blob) return;
        const a = document.createElement("a");
        const key = activeKey().replace(/[:]/g,"_");
        const ts  = new Date().toISOString().replace(/[:.]/g,"-");
        a.download = `inspection_${key}_${ts}.png`;
        a.href = URL.createObjectURL(blob);
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      }, "image/png");
    }

    // -------------------- PDF Handling (with CDN fallback) --------------------
    let pdfjsLib = null;

    async function loadPdfJs(){
      if(pdfjsLib) return pdfjsLib;
      // Try multiple CDNs (corporate networks sometimes block one)
      const candidates = [
        { js:"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js", worker:"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js" },
        { js:"https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js", worker:"https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js" },
        { js:"https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js", worker:"https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js" },
      ];

      for(const c of candidates){
        try{
          await loadScript(c.js);
          if(window["pdfjsLib"]){
            pdfjsLib = window["pdfjsLib"];
            // Worker is often blocked on file:// or restricted environments.
            // workerSrcを明示設定してfake worker警告を抑制
            try{ pdfjsLib.GlobalWorkerOptions.workerSrc = c.worker; }catch(_){}
            return pdfjsLib;
          }
        }catch(e){
          console.warn("pdf.js failed:", c.js, e);
        }
      }
      throw new Error("PDFライブラリ（pdf.js）の読み込みに失敗しました。ネットワーク制限の可能性があります。");
    }

    function loadScript(src){
      return new Promise((resolve,reject)=>{
        // prevent double-load of the same src
        if(document.querySelector(`script[src="${src}"]`)) return resolve();
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = ()=>resolve();
        s.onerror = ()=>reject(new Error("script load failed: " + src));
        document.head.appendChild(s);
      });
    }

    function randomPdfId(){
      return "pdf_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
    }

    // PDFドキュメントをキャッシュ（ページ切替のたびに再読込しないように）
    let cachedPdfDoc = null;
    let cachedPdfFileRef = null;

    async function getCachedPdfDoc(file){
      // 同じファイルなら再利用、違うファイルなら再読込
      if(cachedPdfDoc && cachedPdfFileRef === file) return cachedPdfDoc;
      const lib = await loadPdfJs();
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      const loadingTask = lib.getDocument({ data: bytes });
      cachedPdfDoc = await loadingTask.promise;
      cachedPdfFileRef = file;
      return cachedPdfDoc;
    }

    async function renderPdfPageToDataUrl(file, pageNum){
      const pdf = await getCachedPdfDoc(file);

      const pageCount = pdf.numPages;
      const p = clamp(pageNum, 1, pageCount);
      const page = await pdf.getPage(p);

      const vp1 = page.getViewport({ scale: 1 });

      // PDFの1pt = 1/72インチ。建築図面を読める画質にするため
      // 200DPI相当（scale = 200/72 ≈ 2.78）でレンダリングする。
      // ただしcanvasが巨大になりすぎないよう長辺10000px上限を設ける。
      const TARGET_DPI = 200;
      const dpiScale  = TARGET_DPI / 72;
      const baseMax   = Math.max(vp1.width, vp1.height);
      const MAX_LONG  = 10000; // 長辺上限px
      const scale     = clamp(dpiScale, 0.5, MAX_LONG / baseMax);
      const viewport  = page.getViewport({ scale });

      const c = document.createElement("canvas");
      c.width  = Math.max(1, Math.floor(viewport.width));
      c.height = Math.max(1, Math.floor(viewport.height));
      const cctx = c.getContext("2d", { alpha: false });

      cctx.fillStyle = "#ffffff";
      cctx.fillRect(0, 0, c.width, c.height);

      await page.render({ canvasContext: cctx, viewport, intent: "print" }).promise;
      const dataURL = c.toDataURL("image/png");
      return { dataURL, pageCount };
    }

    async function setPdfBackground(file, opts = {}){
      const pdfId = String(opts.pdfId || randomPdfId());
      const drawingId = opts.drawingId || null;
      const page = clamp(parseInt(String(opts.page || $("pageInput").value || "1"),10), 1, 9999);
      store.activeBg = { kind:"pdf", pdfId, drawingId, page, pageCount: 1, pageCache: {} };
      saveStore();
      redrawBackground();
      updatePageInfo();

      try{
        if(!opts.silent){
          toast("PDFページ画像を生成しています…\n（図面が大きい場合、数秒かかります）");
        }
        const { dataURL, pageCount } = await renderPdfPageToDataUrl(file, page);
        const cacheIdentity = resolvePdfIdentity(store.activeBg);
        store.activeBg.pageCount = pageCount;
        store.activeBg.pageCache[`${cacheIdentity}:${page}`] = dataURL;
        saveStore();
        redrawBackground();
        updatePageInfo();
        if(!opts.silent){
          toast("PDF読み込み完了。図面をクリックしてマーカーを追加できます。");
        }
        markers();
        redrawOverlay();
        redrawList();
      }catch(e){
        console.error(e);
        // Keep pdf selected but show message on canvas
        store.activeBg.pageCount = store.activeBg.pageCount || 1;
        saveStore();
        redrawBackground();
        updatePageInfo();
        toast("PDFの表示に失敗しました。\n原因：\n" + String(e.message||e) + "\n\n対策：\n・ネットワーク制限がある場合は別回線で試す\n・図面が巨大な場合は別ページを試す\n・それでもダメならエラー文を送ってください");
        if(opts.rethrowOnError) throw e;
      }
    }

    async function ensurePageRendered(page){
      const bg = store.activeBg;
      if(bg.kind !== "pdf") return;
      const pdfIdentity = resolvePdfIdentity(bg);
      if(!pdfIdentity){
        toast("PDF識別子がありません。PDFを再選択してください。");
        return;
      }
      const cacheKey = `${pdfIdentity}:${page}`;
      if(bg.pageCache?.[cacheKey]) return;

      if(!lastPdfFile){
        toast("ページ画像が未生成です。もう一度PDFを選択してください（ページ画像生成のため）。");
        return;
      }
      try{
        toast("ページ画像を生成しています…");
        const { dataURL, pageCount } = await renderPdfPageToDataUrl(lastPdfFile, page);
        bg.pageCount = pageCount;
        bg.pageCache[cacheKey] = dataURL;
        saveStore();
      }catch(e){
        console.error(e);
        toast("ページ画像生成に失敗しました。\n" + String(e.message||e));
      }
    }

    function updatePageInfo(){
      const bg = store.activeBg;
      if(bg.kind === "pdf"){
        $("pageInfo").textContent = `PDF: ${bg.page} / ${bg.pageCount || "?"}`;
      }else{
        $("pageInfo").textContent = "PDF未選択";
      }
      $("btnPrevPage").disabled = !(bg.kind==="pdf" && bg.page>1);
      $("btnNextPage").disabled = !(bg.kind==="pdf" && bg.pageCount && bg.page<bg.pageCount);
    }

    let lastPdfFile = null;
    $("pdfInput").addEventListener("change", async (e)=>{
      const file = e.target.files?.[0];
      if(!file) return;
      lastPdfFile = file;
      currentDrawingId = null;
      currentDrawingStoragePath = null;
      await setPdfBackground(file);
    });

    async function setPage(newPage){
      const bg = store.activeBg;
      if(bg.kind !== "pdf") return;
      const p = clamp(newPage, 1, bg.pageCount || 9999);
      bg.page = p;
      $("pageInput").value = String(p);
      saveStore();

      await ensurePageRendered(p);
      redrawBackground();

      selectedId = null;
      redrawOverlay();
      redrawList();
      syncButtons();
      updatePageInfo();
      syncSelectorsFromSelectedMarker();
    }

    $("pageInput").addEventListener("change", async ()=>{
      const p = parseInt($("pageInput").value||"1",10);
      await setPage(p);
    });
    $("btnPrevPage").addEventListener("click", async ()=>{
      const bg = store.activeBg;
      if(bg.kind!=="pdf") return;
      await setPage(bg.page - 1);
    });
    $("btnNextPage").addEventListener("click", async ()=>{
      const bg = store.activeBg;
      if(bg.kind!=="pdf") return;
      await setPage(bg.page + 1);
    });

    // -------------------- Buttons --------------------
    $("btnSupabaseTest").addEventListener("click", ()=>{ testSupabaseConnection(); });
    $("btnNewInspection").addEventListener("click", ()=>{ createNewInspection(); });
    $("btnCloudSave").addEventListener("click", ()=>{ saveToCloud(); });
    $("btnCloudLoad").addEventListener("click", ()=>{
      loadFromCloud(selectedCloudInspectionId || currentInspectionId);
    });
    $("btnToggleMappingPanel").addEventListener("click", ()=>{
      $("mappingPanel").classList.toggle("open");
    });
    $("btnSaveMappings").addEventListener("click", ()=>{ saveCategoryVendorMappings(); });
    $("btnReloadMappings").addEventListener("click", ()=>{ loadCategoryVendorMappings(); });

    $("btnSavePng").addEventListener("click", savePng);
    $("btnDeleteSelected").addEventListener("click", ()=>{
      deleteSelected();
    });
    $("btnEditMemo").addEventListener("click", ()=>{
      if(!selectedId) return;
      const m = markers().find(mm=>mm.id===selectedId);
      if(m) openQuickMarkerEditor(m, { isNew: false });
    });
    $("btnClearStorage").addEventListener("click", ()=>{
      const ok = confirm("端末内の保存データを削除します。\n（マーカー・PDFページ画像キャッシュが消えます）\nよろしいですか？");
      if(!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      store = loadStore();
      selectedId = null;
      filterVendor = "";
      $("filterVendor").value = "";
      $("memoInput").value = "";
      $("pageInput").value = "1";
      lastPdfFile = null;
      currentDrawingId = null;
      currentDrawingStoragePath = null;
      cachedPdfDoc = null;
      cachedPdfFileRef = null;
      $("pdfInput").value = "";  // ファイル入力をリセット（同じPDFを再選択できるように）
      redrawBackground();
      redrawOverlay();
      redrawList();
      syncButtons();
      updatePageInfo();
      syncSelectorsFromSelectedMarker();
      toast("保存データを削除しました。");
    });

    // -------------------- Fullscreen --------------------
    let isFullscreen = false;
    let fsRotation = 0; // 0 | 90 | 180 | 270

    const ROT_CLASSES = { 0:'', 90:'rot90', 180:'rot180', 270:'rot270' };

    function applyRotationClass(){
      stageWrap.classList.remove('rot90','rot180','rot270');
      const cls = ROT_CLASSES[fsRotation];
      if(cls) stageWrap.classList.add(cls);

      setTimeout(()=>{
        const vw = window.innerWidth, vh = window.innerHeight;
        const isSwapped = (fsRotation === 90 || fsRotation === 270);
        stageW = Math.max(1, isSwapped ? vh : vw);
        stageH = Math.max(1, isSwapped ? vw : vh);
        bgCanvas.width  = stageW;
        bgCanvas.height = stageH;
        overlay.setAttribute("viewBox", `0 0 ${stageW} ${stageH}`);
        redrawBackground();
        redrawOverlay();
        // 回転後もパネルは中央下に戻す
        panelPos = null;
        setPanelDefault();
      }, 320);
    }

    function syncFsSelects(){
      // メインのselectとfsのselectを同期
      $("fsTypeSelect").value   = $("typeSelect").value;
      $("fsVendorSelect").value = $("vendorSelect").value;
    }
    function updateFsInfo(){
      const bg = store.activeBg;
      $("fsPageInfo").textContent = bg.kind==="pdf" ? `${bg.page} / ${bg.pageCount||"?"}` : "-";
      $("fsBtnPrev").disabled = !(bg.kind==="pdf" && bg.page>1);
      $("fsBtnNext").disabled = !(bg.kind==="pdf" && bg.pageCount && bg.page<bg.pageCount);
      $("fsMarkerCount").textContent = `指摘 ${markers().length}件`;
    }

    // ネイティブFullscreen APIのヘルパー（モバイル対応）
    function requestNativeFs(){
      const el = document.documentElement;
      try{
        if(el.requestFullscreen)            return el.requestFullscreen();
        if(el.webkitRequestFullscreen)      return el.webkitRequestFullscreen(); // iOS Safari
        if(el.mozRequestFullScreen)         return el.mozRequestFullScreen();
      }catch(_){}
    }
    function exitNativeFs(){
      try{
        if(document.exitFullscreen)         return document.exitFullscreen();
        if(document.webkitExitFullscreen)   return document.webkitExitFullscreen();
        if(document.mozCancelFullScreen)    return document.mozCancelFullScreen();
      }catch(_){}
    }
    function isNativeFs(){
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    }

    function enterFullscreen(){
      isFullscreen = true;
      // 通常モードの回転をフルスクリーンに引き継ぎ、通常モードはリセット
      fsRotation = normalRotation;
      normalRotation = 0;
      panelPos = null;
      stageWrap.classList.remove("rot90","rot180","rot270");
      stageWrap.classList.add("fullscreen");
      // 引き継いだ回転クラスを即時適用
      const initCls = ROT_CLASSES[fsRotation];
      if(initCls) stageWrap.classList.add(initCls);
      $("fsPanel").classList.add("show");
      $("btnFullscreen").textContent = "✕ 閉じる";
      syncFsSelects();
      updateFsInfo();
      requestNativeFs();
      setTimeout(()=>{
        resizeStage();
        setPanelDefault();
      }, 200);
    }

    function exitFullscreen(){
      isFullscreen = false;
      // フルスクリーンの回転を通常モードに引き継ぎ
      normalRotation = fsRotation;
      fsRotation = 0;
      stageWrap.classList.remove("fullscreen","rot90","rot180","rot270");
      const _panel = $("fsPanel");
      _panel.classList.remove("show");
      _panel.style.left = "";
      _panel.style.top  = "";
      _panel.style.bottom = "";
      _panel.style.transform = "";
      panelPos = null;
      $("btnFullscreen").textContent = "⛶ フルスクリーン";
      if(isNativeFs()) exitNativeFs();
      setTimeout(resizeStage, 50);
    }

    // ブラウザのEsc/スワイプでネイティブFSが終了したときにアプリ側も同期
    document.addEventListener("fullscreenchange",       _onNativeFsChange);
    document.addEventListener("webkitfullscreenchange", _onNativeFsChange);
    document.addEventListener("mozfullscreenchange",    _onNativeFsChange);
    function _onNativeFsChange(){
      if(!isNativeFs() && isFullscreen){
        // ネイティブFSだけ終了した → アプリのUIも閉じる
        exitFullscreen();
      }
    }

    $("btnFullscreen").addEventListener("click", ()=>{
      isFullscreen ? exitFullscreen() : enterFullscreen();
    });
    $("btnExitFs").addEventListener("click", exitFullscreen);
    $("fsBtnDelete").addEventListener("click", ()=>{
      deleteSelected();
    });
    $("fsBtnEditMemo").addEventListener("click", ()=>{
      if(!selectedId) return;
      const m = markers().find(mm=>mm.id===selectedId);
      if(m) openQuickMarkerEditor(m, { isNew: false });
    });

    // 回転ボタン
    // 通常モード回転ボタン
    $("btnRotL").addEventListener("click", ()=>{
      normalRotation = (normalRotation - 90 + 360) % 360;
      redrawBackground();
    });
    $("btnRotR").addEventListener("click", ()=>{
      normalRotation = (normalRotation + 90) % 360;
      redrawBackground();
    });

    $("fsBtnRotL").addEventListener("click", ()=>{
      fsRotation = (fsRotation - 90 + 360) % 360;
      applyRotationClass();
    });
    $("fsBtnRotR").addEventListener("click", ()=>{
      fsRotation = (fsRotation + 90) % 360;
      applyRotationClass();
    });

    // フルスクリーン時のselectをメインと同期
    $("fsTypeSelect").addEventListener("change", ()=>{
      $("typeSelect").value = $("fsTypeSelect").value;
      $("typeSelect").dispatchEvent(new Event("change"));
    });
    $("fsVendorSelect").addEventListener("change", ()=>{
      $("vendorSelect").value = $("fsVendorSelect").value;
      $("vendorSelect").dispatchEvent(new Event("change"));
    });

    // フルスクリーン時のページ操作
    $("fsBtnPrev").addEventListener("click", async ()=>{
      const bg = store.activeBg;
      if(bg.kind!=="pdf") return;
      await setPage(bg.page - 1);
      updateFsInfo();
    });
    $("fsBtnNext").addEventListener("click", async ()=>{
      const bg = store.activeBg;
      if(bg.kind!=="pdf") return;
      await setPage(bg.page + 1);
      updateFsInfo();
    });



    // Escキーでも閉じる
    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape" && isFullscreen){ exitFullscreen(); e.preventDefault(); }
    });

    // -------------------- Panel Drag --------------------
    // パネル位置はビューポート基準(position:fixed)のpx
    // panelPos=nullのとき = デフォルト中央下
    let panelPos = null;
    let panelDrag = null;
    const fsPanel = $("fsPanel");

    function setPanelDefault(){
      // ビューポート中央下に配置
      const panel = fsPanel;
      const pw = panel.offsetWidth  || 600;
      const ph = panel.offsetHeight || 80;
      const vw = window.innerWidth, vh = window.innerHeight;
      panelPos = {
        x: Math.round((vw - pw) / 2),
        y: vh - ph - 24
      };
      applyPanelPos();
    }

    function applyPanelPos(){
      if(!panelPos) return;
      const panel = fsPanel;
      const pw = panel.offsetWidth, ph = panel.offsetHeight;
      const vw = window.innerWidth, vh = window.innerHeight;
      // 画面外にはみ出さないようにクランプ
      const x = Math.max(0, Math.min(vw - pw, panelPos.x));
      const y = Math.max(0, Math.min(vh - ph, panelPos.y));
      panel.style.left      = x + "px";
      panel.style.top       = y + "px";
      panel.style.bottom    = "auto";
      panel.style.transform = "none"; // 回転補正不要（body直下のfixed）
    }

    fsPanel.addEventListener("pointerdown", (e)=>{
      if(e.target.tagName === "SELECT" || e.target.tagName === "BUTTON" || e.target.tagName === "OPTION") return;
      if(!isFullscreen) return;
      e.stopPropagation();

      const rect = fsPanel.getBoundingClientRect();
      panelDrag = {
        startClientX: e.clientX,
        startClientY: e.clientY,
        startPanelX: panelPos ? panelPos.x : rect.left,
        startPanelY: panelPos ? panelPos.y : rect.top,
      };
      if(!panelPos) panelPos = { x: rect.left, y: rect.top };
      fsPanel.classList.add("dragging");
      fsPanel.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    fsPanel.addEventListener("pointermove", (e)=>{
      if(!panelDrag) return;
      // position:fixed なので回転関係なくそのままビューポート座標で動く
      panelPos = {
        x: panelDrag.startPanelX + (e.clientX - panelDrag.startClientX),
        y: panelDrag.startPanelY + (e.clientY - panelDrag.startClientY),
      };
      applyPanelPos();
      e.preventDefault();
    });

    fsPanel.addEventListener("pointerup", (e)=>{
      if(!panelDrag) return;
      panelDrag = null;
      fsPanel.classList.remove("dragging");
      e.preventDefault();
    });

    // ウィンドウリサイズ時も中央下に戻す
    window.addEventListener("resize", ()=>{
      if(isFullscreen){ panelPos = null; setPanelDefault(); }
    });

        // -------------------- Boot --------------------
    function boot(){
      resizeStage();
      loadCategoryVendorMappings().catch(()=>{});
      // Ensure active key exists
      markers();
      redrawBackground();
      redrawOverlay();
      redrawList();
      syncButtons();
      syncSelectorsFromSelectedMarker();
      updatePageInfo();
      initCloudUi();
      if(isSupabaseConfigured()){
        refreshCloudInspectionList().catch(()=>{});
      }
      toast("起動しました。PDFを選択するか、背景なしでマーカー配置のテストができます。");
    }
    boot();
  }); // DOMContentLoaded
  </script>
</body>
</html>
